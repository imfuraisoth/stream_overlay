<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name1="viewport" content="width=device-width">
    <meta name2="viewport" content="width=device-width">
    <meta social1="viewport" content="width=device-width">
    <meta social2="viewport" content="width=device-width">
    <meta nextPlayer1="viewport" content="width=device-width">
    <meta nextPlayer2="viewport" content="width=device-width">
	<link rel="stylesheet" href="https://use.typekit.net/vsy6ybb.css">
    <title>Commentator Overlay</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
    <script src="https://kit.fontawesome.com/2c93766a80.js" crossorigin="anonymous"></script>
	<script src="../scoreboard/js/jquery-3.6.3.min.js" type="text/javascript" charset="utf-8"></script>
  </head>
  <body>
    <script>
	// Delay time in milliseconds (e.g., 5000 milliseconds = 5 seconds)
	const delayTime = 200;
	
    var com1Value = "";
    var com2Value = "";
    var soc1Value = "";
    var soc2Value = "";
    var nextPlayer1 = "";
    var nextPlayer2 = "";
	var resultName1 = "";
	var resultName2 = "";
	var result1 = "";
	var result2 = "";
	var bgLoaded = false;
    var serverIp = readServerIp();

    function readServerIp() {
        var request = new XMLHttpRequest();
        request.open("GET", "../config/serverip.txt", false);
        request.send(null);
        var returnValue = request.responseText;
        return returnValue;
    }

    function loadElements() {			
      fetch('http://' + serverIp + '/getdata')
          .then(function (response) {
            return response.json();
          })
          .then(function (data) {
              appendData(data);
            })
          .catch(function (err) {
            console.log('error: ' + err);
          });
          async function appendData(data) {
			if (data.com1 !== com1Value && data.soc1 !== soc1Value) {
				com1Value = data.com1;
				soc1Value = data.soc1;
				updatePair("name1", "soc1", com1Value, soc1Value);
			} else {
				if (data.com1 !== com1Value) {
					com1Value = data.com1;
					await updateElement("name1", com1Value);
				}
				if (data.soc1 !== soc1Value) {
					soc1Value = data.soc1;
					await updateElement("soc1", soc1Value);
				}
			}
			if (data.com2 !== com2Value && data.soc2 !== soc2Value) {
				com2Value = data.com2;
				soc2Value = data.soc2;
				updatePair("name2", "soc2", com2Value, soc2Value);
			} else {
				if (data.com2 !== com2Value) {
					com2Value = data.com2;
					await updateElement("name2", com2Value);
				}
				if (data.soc2 !== soc2Value) {
					soc2Value = data.soc2;
					await updateElement("soc2", soc2Value);
				}
			}
          }  
    }

	
	function sleep (time) {
		return new Promise((resolve) => setTimeout(resolve, time));
	}
	
	async function updatePair(nameId, socId, nameValue, socValue) {
		const nameEl = document.getElementById(nameId);
		const socEl = document.getElementById(socId);

		// fade BOTH out at same time
		nameEl.classList.remove("show");
		socEl.classList.remove("show");

		await sleep(1000);

		// update both at same time
		nameEl.textContent = nameValue;
		socEl.textContent = socValue;

		// fade BOTH in at same time
		nameEl.classList.add("show");
		socEl.classList.add("show");
	}

	async function updateElement(id, newValue) {
		const element = document.getElementById(id);

		// Don't animate if nothing changed
		if (element.textContent === newValue) {
			return;
		}

		// Fade out
		element.classList.remove("show");

		// Wait for fade-out to finish
		await sleep(1000);

		// Update text
		element.textContent = newValue;

		// Fade back in
		if (newValue.length > 0) {
			element.classList.add("show");
		}
	}

    window.setInterval(loadElements, 2000);
    </script>
	
		<video id="commentatorBG" width="1920" height="1080">
		  Your browser does not support the video tag.
		</video>
		<div id="scoreboard">
			<div id="name1Div">
				<span id="name1" class="fade-in"></span>
				<span id="soc1" class="fade-in"></span>
			</div>
			<div id="name2Div">
				<span id="name2" class="fade-in"></span>
				<span id="soc2" class="fade-in"></span>
			</div>
		</div>
	
  </body>
</html>
