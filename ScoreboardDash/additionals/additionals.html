<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Additional Options</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="../images/V.png">
  <link href="style.css" rel="stylesheet" type="text/css" />
  <script>
    // Apply saved theme before paint to prevent flash
    (function(){var s=localStorage.getItem('sc_theme');if(!s)return;try{var v=JSON.parse(s);Object.keys(v).forEach(function(k){document.documentElement.style.setProperty(k,v[k])});}catch(e){}})();
  </script>
  <link href="../theme/theme.css" rel="stylesheet" type="text/css">
</head>
<body>

  <div class="top-navbar-container">
    <div class="header-item"><a href="../commentators/commentators.html">Commentators</a></div>
    <span class="header-sep">|</span>
    <div class="header-item"><a href="../index.html">Event Dashboard</a></div>
    <span class="header-sep">|</span>
    <div class="header-item"><a href="../top8/top8.html">Top 8</a></div>
    <span class="header-sep">|</span>
    <div class="header-item"><a href="../playerinfo/characterselect.html">Character Select</a></div>
    <span class="header-sep">|</span>
    <div class="header-item active"><a href="additionals.html">Additional Options</a></div>
    <span class="header-sep">|</span>
    <div class="header-item"><a href="../stations/stations.html">Stations</a></div>
    <span class="header-sep">|</span>
    <div class="header-item"><a href="../players/players.html">Players</a></div>
  </div>

<div class="container">
  <div class="content" id="contentContainer">
    <div id="panel">
      <h2>Set Countdown</h2>

      <label for="gameSelect">Game</label>
      <select id="gameSelect"></select>

      <label for="message">Message</label>
      <input type="text" id="message" placeholder="Enter message">

      <label for="timer">Timer (HH:MM:SS)</label>
      <input type="text" id="timer" placeholder="00:00:00" value="00:10:00">

      <button onclick="submitData()">Start Countdown</button>
    </div>

    <div id="customMessagePanel">
      <h2>Custom Messages</h2>
      <label for="cameraSceneMessage">Camera Scene Message</label>
      <input type="text" id="cameraSceneMessage" placeholder="Enter message">
      <button onclick="submitMessageData()">Submit</button>
    </div>
  </div>
</div>

<script>
let games = [];

async function loadGames() {
  try {
    const res = await fetch('/getGamesForCountdown');
    games = await res.json();
    const select = document.getElementById("gameSelect");
    select.innerHTML = "";
    games.slice().sort((a, b) => a.localeCompare(b)).forEach((gameName) => {
      const option = document.createElement("option");
      option.value = gameName;
      option.textContent = gameName;
      select.appendChild(option);
    });
  } catch (err) { console.error("Failed to load games:", err); }
}

async function loadCountdownData() {
  try {
    const res = await fetch('/getCountdownInfo?firstLoad=true');
    const data = await res.json();
    if (data.game_name) document.getElementById("gameSelect").value = data.game_name;
    if (data.message !== undefined) document.getElementById("message").value = data.message;
    if (data.timer !== undefined) document.getElementById("timer").value = secondsToTime(data.timer);
  } catch (err) { console.error("Failed to load countdown:", err); }
}

async function getCustomMessages() {
  try {
    const res = await fetch('/getCustomMessages');
    const data = await res.json();
    if (data.cameraSceneMessage !== undefined)
      document.getElementById("cameraSceneMessage").value = data.cameraSceneMessage;
  } catch (err) { console.error("Failed to load messages:", err); }
}

function secondsToTime(totalSeconds) {
  const h = Math.floor(totalSeconds / 3600);
  const m = Math.floor((totalSeconds % 3600) / 60);
  const s = totalSeconds % 60;
  return String(h).padStart(2,'0') + ":" + String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');
}

function timeToSeconds(timeStr) {
  const match = timeStr.match(/^(\d{1,2}):(\d{2}):(\d{2})$/);
  if (!match) { alert("Invalid time format! Use HH:MM:SS"); return 0; }
  return parseInt(match[1])*3600 + parseInt(match[2])*60 + parseInt(match[3]);
}

async function submitData() {
  const payload = {
    game_name: document.getElementById("gameSelect").value,
    icon_file: "",
    message: document.getElementById("message").value,
    timer: timeToSeconds(document.getElementById("timer").value)
  };
  try {
    await fetch('/setCountdownInfo', { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(payload) });
    alert("Countdown started!");
  } catch (err) { console.error("Failed to submit:", err); }
}

async function submitMessageData() {
  try {
    await fetch('/setCustomMessages', {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ cameraSceneMessage: document.getElementById("cameraSceneMessage").value })
    });
  } catch (err) { console.error("Failed to submit:", err); }
}

document.addEventListener("DOMContentLoaded", async () => {
  await loadGames();
  await loadCountdownData();
  getCustomMessages();
});
</script>

  <script src="../theme/theme.js" defer></script>
</body>
</html>
