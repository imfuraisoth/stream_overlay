<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Countdown Control Panel</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
</head>

<body>

<div class="container">
    <div class="top-navbar-container">
        <div id="Commentators" class="header-item">
            <a href="../commentators/commentators.html" style="text-decoration: none">Commentators</a>
        </div>
        <div class="header-item-divider">|</div>
        <div id="Event_Dashboard" class="header-item">
            <a href="../index.html" style="text-decoration: none">Event Dashboard</a>
        </div>
        <div class="header-item-divider">|</div>
        <div id="Top_8" class="header-item">
            <a href="../top8/top8.html" style="text-decoration: none">Top 8</a>
        </div>
    </div>

    <div class="content" id="contentContainer">
        <div id="panel">
            <h2>Set Countdown</h2>

            <label for="gameSelect">Game</label>
            <select id="gameSelect"></select>

            <label for="message">Message</label>
            <input type="text" id="message" placeholder="Enter message">

            <label for="timer">Timer (HH:MM:SS)</label>
            <input type="text" id="timer" placeholder="00:00:00" value="00:10:00">

            <button onclick="submitData()">Start Countdown</button>
        </div>
        <div id="customMessagePanel">
            <h2>Set Custom Messages</h2>
            <label for="message">Camera Scene Message</label>
            <input type="text" id="cameraSceneMessage" placeholder="Enter message">

            <button onclick="submitMessageData()">Submit</button>
        </div>
    </div>
</div>

<script>
let games = [];

async function loadGames() {
    try {
        const res = await fetch('/getGamesForCountdown');
        games = await res.json(); // Array of strings

        const select = document.getElementById("gameSelect");
        select.innerHTML = "";

        games.slice() // optional: avoids mutating the original array
          .sort((a, b) => a.localeCompare(b))
          .forEach((gameName) => {
            const option = document.createElement("option");
            option.value = gameName;
            option.textContent = gameName;
            select.appendChild(option);
        });

    } catch (err) {
        console.error("Failed to load games:", err);
    }
}

async function loadCountdownData() {
    try {
        const res = await fetch('/getCountdownInfo?firstLoad=true');
        const data = await res.json();

        // Populate game select (after games are loaded)
        if (data.game_name) {
            const select = document.getElementById("gameSelect");
            select.value = data.game_name;
        }

        // Populate message
        if (data.message !== undefined) {
            document.getElementById("message").value = data.message;
        }

        // Convert seconds -> HH:MM:SS
        if (data.timer !== undefined) {
            document.getElementById("timer").value = secondsToTime(data.timer);
        }
    } catch (err) {
        console.error("Failed to load games:", err);
    }
}

async function getCustomMessages() {
    try {
        const res = await fetch('/getCustomMessages');
        const data = await res.json();

        // Custom message
        if (data.cameraSceneMessage !== undefined) {
            document.getElementById("cameraSceneMessage").value = data.cameraSceneMessage;
        }
    } catch (err) {
        console.error("Failed to load games:", err);
    }
}

function secondsToTime(totalSeconds) {
    const hours = Math.floor(totalSeconds / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;

    return (
        String(hours).padStart(2, '0') + ":" +
        String(minutes).padStart(2, '0') + ":" +
        String(seconds).padStart(2, '0')
    );
}

function timeToSeconds(timeStr) {
    // Match HH:MM:SS
    const match = timeStr.match(/^(\d{1,2}):(\d{2}):(\d{2})$/);
    if (!match) {
        alert("Invalid time format! Use HH:MM:SS");
        return 0;
    }

    const hours = parseInt(match[1], 10);
    const minutes = parseInt(match[2], 10);
    const seconds = parseInt(match[3], 10);

    return hours * 3600 + minutes * 60 + seconds;
}

async function submitData() {
    const gameName = document.getElementById("gameSelect").value;
    const message = document.getElementById("message").value;
    const timerStr = document.getElementById("timer").value;

    const payload = {
        game_name: gameName,
        icon_file: "", // can fill or leave blank
        message: message,
        timer: timeToSeconds(timerStr)
    };

    try {
        await fetch('/setCountdownInfo', {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });
		
		alert("Countdown started!");

    } catch (err) {
        console.error("Failed to submit:", err);
    }
}

async function submitMessageData() {
    const cameraSceneMessage = document.getElementById("cameraSceneMessage").value;

    const payload = {
        cameraSceneMessage: cameraSceneMessage
    };

    try {
        await fetch('/setCustomMessages', {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

    } catch (err) {
        console.error("Failed to submit:", err);
    }
}

// Load games on page start
document.addEventListener("DOMContentLoaded", async () => {
    await loadGames();
    await loadCountdownData();
    getCustomMessages();
});
</script>

</body>
</html>
