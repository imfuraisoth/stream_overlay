<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="sd_title">Seeding — Stream Overlay</title>
  <link rel="icon" type="image/png" href="../images/V.png">
  <link href="../base.css" rel="stylesheet" type="text/css">
  <link href="../players/style.css" rel="stylesheet" type="text/css">
  <script>
    (function(){var s=localStorage.getItem('sc_theme');if(!s)return;try{var v=JSON.parse(s);Object.keys(v).forEach(function(k){document.documentElement.style.setProperty(k,v[k])});}catch(e){}})();
  </script>
  <link href="../theme/theme.css" rel="stylesheet" type="text/css">
  <style>
    .sd-wrap { max-width: 1150px; margin: 0 auto; padding: 20px; }
    .sd-hint { font-family: var(--font-d, 'Barlow Condensed'); font-size: 12px; color: var(--fg2); margin: 6px 0 16px; }
    .sd-bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
    .sd-bar input[type=text] { flex: 1 1 240px; min-width: 0; }
    .sd-controls { display: flex; gap: 16px; align-items: flex-end; flex-wrap: wrap;
      background: var(--bg2); border: 1px solid var(--border); border-radius: 6px;
      padding: 12px; margin-bottom: 16px; }
    .sd-ctl { display: flex; flex-direction: column; gap: 4px; font-size: 11px; color: var(--fg2); }
    .sd-ctl select, .sd-ctl input { background: var(--bg3); border: 1px solid var(--border);
      color: var(--fg); border-radius: 4px; padding: 4px 6px; font-size: 13px; }
    .sd-status { font-family: var(--font-d, 'Barlow Condensed'); font-size: 13px; color: var(--fg2); margin: 8px 0; }
    .sd-warn { color: var(--accent2, #c43030); }
    .sd-section-title { font-family: var(--font-d, 'Barlow Condensed'); font-weight: 700;
      text-transform: uppercase; letter-spacing: .04em; font-size: 14px; color: var(--fg);
      margin: 22px 0 8px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
    table.sd { width: 100%; border-collapse: collapse; font-size: 13px; }
    table.sd th, table.sd td { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border); }
    table.sd th { font-family: var(--font-d, 'Barlow Condensed'); text-transform: uppercase;
      font-size: 11px; color: var(--fg2); }
    .sd-seed { width: 42px; font-weight: 700; color: var(--accent); }
    .sd-pts { width: 90px; text-align: right; font-variant-numeric: tabular-nums; }
    .sd-evt { width: 70px; text-align: right; color: var(--fg2); }
    .sd-math { color: var(--fg2); font-size: 11px; }
    .sd-math-toggle { cursor: pointer; color: var(--accent); font-size: 11px; user-select: none; }
    .sd-detail td { background: var(--bg2); font-size: 11px; color: var(--fg2); }
    .sd-detail .pill { display: inline-block; margin: 2px 6px 2px 0; padding: 1px 6px;
      border: 1px solid var(--border); border-radius: 10px; white-space: nowrap; }
    .sd-recon { display: flex; gap: 6px; align-items: center; }
    .sd-recon select { background: var(--bg3); border: 1px solid var(--border); color: var(--fg);
      border-radius: 4px; padding: 3px 5px; font-size: 12px; }
    .sd-empty { color: var(--fg2); font-style: italic; padding: 8px; }
    .sd-copybar { margin: 10px 0; }
    .sd-rematch-card { background: var(--bg2); border: 1px solid var(--accent2, #c43030);
      border-radius: 8px; padding: 14px 16px; margin-bottom: 18px; }
    .sd-rematch-head { font-family: var(--font-d, 'Barlow Condensed'); font-weight: 700;
      font-size: 15px; color: var(--accent2, #c43030); margin-bottom: 4px; }
    .sd-rematch-sub { font-size: 12px; color: var(--fg2); margin-bottom: 10px; }
    .sd-state-card { border-color: var(--accent, #40D0B0); }
    .sd-state-head { color: var(--accent, #40D0B0); }
    .sd-city-card { border-color: var(--amber, #E8A050); }
    .sd-city-head { color: var(--amber, #E8A050); }
    .sd-draghint { font-size: 11px; color: var(--fg2); font-style: italic; margin-bottom: 6px; }
    .sd-drag-row { cursor: grab; }
    .sd-drag-row.sd-dragging { opacity: 0.4; }
    .sd-drag-row.sd-drop-target td { border-top: 2px solid var(--accent, #40D0B0); }
    .sd-grip { color: var(--fg2); margin-right: 8px; cursor: grab; user-select: none; }
    .sd-section-row { cursor: grab; }
    .sd-section-row.sd-dragging { opacity: 0.4; }
    .sd-promoted td { background: rgba(64, 208, 176, 0.06); }
    .sd-nohist { font-size: 10px; text-transform: uppercase; letter-spacing: .04em;
      color: var(--fg2); border: 1px solid var(--border); border-radius: 8px; padding: 0 6px; margin-left: 6px; }
    .sd-return { cursor: pointer; color: var(--accent, #40D0B0); font-size: 15px; user-select: none; }
    .sd-return:hover { opacity: 0.7; }
    .loc-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000;
      display: flex; align-items: center; justify-content: center; }
    .loc-modal-box { background: var(--bg1, #0D1828); border: 1px solid var(--border);
      border-radius: 10px; width: min(760px, 92vw); max-height: 86vh; display: flex;
      flex-direction: column; box-shadow: 0 12px 40px rgba(0,0,0,0.5); }
    .loc-modal-head { display: flex; justify-content: space-between; align-items: center;
      padding: 14px 18px; font-family: var(--font-d, 'Barlow Condensed'); font-weight: 700;
      font-size: 17px; border-bottom: 1px solid var(--border); }
    .loc-close { cursor: pointer; font-size: 22px; color: var(--fg2); }
    .loc-close:hover { color: var(--fg1); }
    .loc-modal-sub { padding: 8px 18px; color: var(--fg2); font-size: 13px; }
    .loc-modal-body { overflow-y: auto; padding: 6px 18px; }
    .loc-modal-foot { display: flex; justify-content: flex-end; gap: 8px;
      padding: 14px 18px; border-top: 1px solid var(--border); }
    .loc-table th, .loc-table td { text-align: left; padding: 6px 8px; }
    .loc-flagged-row td { background: rgba(204, 31, 31, 0.07); }
    .loc-badge { font-size: 10px; text-transform: uppercase; letter-spacing: .04em;
      border-radius: 8px; padding: 1px 6px; margin-left: 6px; }
    .loc-conflict { background: rgba(204,31,31,0.2); color: #ff8a8a; }
    .loc-nonstd { background: rgba(232,160,80,0.2); color: var(--amber, #E8A050); }
    .loc-fill { background: rgba(64,208,176,0.18); color: var(--accent, #40D0B0); }
    .loc-unmatched { background: var(--bg2); color: var(--fg2); }
    .loc-edit { background: var(--bg2); border: 1px solid var(--border); color: var(--fg1);
      border-radius: 4px; padding: 3px 6px; }
  </style>
</head>
<body>
<div id="nav-root" style="min-height:45px"></div>
<div class="sd-wrap">
  <h2 style="margin-bottom:4px;" data-i18n="sd_heading">Seeding Suggestion</h2>
  <div class="sd-hint" data-i18n="sd_hint">
    Pull a start.gg event's entrants, match them to your imported history, and get a
    suggested seed order to enter into start.gg manually. This never writes to start.gg.
  </div>

  <div class="sd-bar">
    <input type="text" id="slugInput" data-i18n-attr="placeholder:sd_slug_ph"
           placeholder="https://www.start.gg/tournament/.../event/...  or  tournament/.../event/...">
    <button class="btn" id="sdFetch" onclick="fetchSeeding(true)" data-i18n="sd_fetch">Fetch Entrants</button>
    <button class="btn sec" id="sdPullLoc" onclick="pullLocations()" data-i18n="sd_pull_loc">Pull locations from start.gg</button>
  </div>

  <div id="locReviewModal" class="loc-modal" style="display:none;">
    <div class="loc-modal-box">
      <div class="loc-modal-head">
        <span data-i18n="sd_loc_review_title">Review player locations from start.gg</span>
        <span class="loc-close" onclick="closeLocReview()">&times;</span>
      </div>
      <div class="loc-modal-sub" id="locReviewSummary"></div>
      <div class="loc-modal-body" id="locReviewBody"></div>
      <div class="loc-modal-foot">
        <button class="btn sec" onclick="closeLocReview()" data-i18n="sd_loc_cancel">Cancel</button>
        <button class="btn" onclick="applyLocations()" data-i18n="sd_loc_apply">Save selected</button>
      </div>
    </div>
  </div>

  <div class="sd-controls">
    <label class="sd-ctl"><span data-i18n="sd_scope">History scope</span>
      <select id="scopeSelect" onchange="onScopeChange()"></select>
    </label>
    <label class="sd-ctl" id="scopeValueWrap" style="display:none;"><span data-i18n="sd_scope_value">Which</span>
      <select id="scopeValueSelect" onchange="recompute()"></select>
    </label>
    <label class="sd-ctl"><span data-i18n="sd_curve">Placement curve</span>
      <select id="curveSelect" onchange="recompute()">
        <option value="standard" data-i18n="sd_curve_standard">Standard</option>
        <option value="topheavy" data-i18n="sd_curve_topheavy">Top-heavy</option>
        <option value="linear" data-i18n="sd_curve_linear">Gentle/linear</option>
      </select>
    </label>
    <label class="sd-ctl"><span data-i18n="sd_decay">Decay mode</span>
      <select id="decaySelect" onchange="onDecayChange()">
        <option value="none" data-i18n="sd_decay_none">None (cumulative)</option>
        <option value="absence" data-i18n="sd_decay_absence">By absence</option>
        <option value="recency" data-i18n="sd_decay_recency">By recency</option>
      </select>
    </label>
    <label class="sd-ctl" id="thresholdWrap" style="display:none;"><span data-i18n="sd_threshold">No-shows before decay</span>
      <input type="number" id="thresholdInput" min="1" value="2" style="width:70px;" onchange="recompute()">
    </label>
    <label class="sd-ctl" id="recencyWrap" style="display:none;"><span data-i18n="sd_recency_factor">Recency factor</span>
      <input type="number" id="recencyInput" min="0.1" max="1" step="0.05" value="0.85" style="width:80px;" onchange="recompute()">
    </label>
    <label class="sd-ctl"><span data-i18n="sd_check_mode">Bracket check</span>
      <select id="checkMode" onchange="recompute()">
        <option value="off" data-i18n="sd_check_off">Off</option>
        <option value="rematch" selected data-i18n="sd_check_rematch">Rematch only</option>
        <option value="state" data-i18n="sd_check_state">Same-state only</option>
        <option value="city" data-i18n="sd_check_city">Same-city only</option>
        <option value="rematch_state" data-i18n="sd_check_rematch_state">Rematch + state</option>
        <option value="rematch_city" data-i18n="sd_check_rematch_city">Rematch + city</option>
        <option value="all" data-i18n="sd_check_all">All checks</option>
      </select>
    </label>
    <label class="sd-ctl"><span data-i18n="sd_rematch_rounds">Flag within</span>
      <select id="rematchRounds" onchange="recompute()">
        <option value="1" data-i18n="sd_rematch_r1">Round 1</option>
        <option value="2" selected data-i18n="sd_rematch_r2">First 2 rounds</option>
        <option value="3" data-i18n="sd_rematch_r3">First 3 rounds</option>
      </select>
    </label>
    <label class="sd-ctl"><span data-i18n="sd_rematch_recency">Rematch recency</span>
      <input type="number" id="rematchRecency" min="0.1" max="1" step="0.05" value="0.8" style="width:80px;" onchange="recompute()">
    </label>
    <label class="sd-ctl"><span data-i18n="sd_rematch_lookback">Only last N events (0=all)</span>
      <input type="number" id="rematchLookback" min="0" value="0" style="width:70px;" onchange="recompute()">
    </label>
  </div>

  <div class="sd-status" id="sdStatus"></div>

  <div id="sdRematches"></div>
  <div id="sdStateClashes"></div>
  <div id="sdCityClashes"></div>
  <div id="sdRanked"></div>
  <div id="sdKnownUnranked"></div>
  <div id="sdUnmatched"></div>
</div>

<script>
  var lastResult = null;     // last compute response
  var seedOrder = [];        // mutable ranked order (drag-and-drop reorders this)
  var dragInfo = null;       // {source:'seed'|'section', key, index}
  var promoted = {};         // identity key -> true for section players dragged into the seed list

  // Stable identity for a row: player_id if it has one, else the tag.
  function rowKey(r){ return r.player_id ? ('p:' + r.player_id) : ('t:' + (r.tag || r.name || '')); }
  var localPlayers = [];     // [{id,name}] for reconcile dropdown
  var seriesList = [];

  function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function setStatus(t, warn){
    var el = document.getElementById('sdStatus');
    el.textContent = t || '';
    el.className = 'sd-status' + (warn ? ' sd-warn' : '');
  }

  async function loadLocalPlayers(){
    try {
      var r = await fetch('/getLocalPlayers');
      var ps = await r.json();
      localPlayers = (ps || []).map(function(p){ return {id:p.id, name:p.name}; })
                               .sort(function(a,b){ return a.name.localeCompare(b.name); });
    } catch(e){ console.log('loadLocalPlayers error:', e); }
  }

  async function loadScopes(){
    var scopeSel = document.getElementById('scopeSelect');
    scopeSel.innerHTML =
      '<option value="all">' + esc(window.t ? window.t('sd_scope_all') : 'All imported history') + '</option>'
      + '<option value="series">' + esc(window.t ? window.t('sd_scope_series') : 'A series') + '</option>'
      + '<option value="game">' + esc(window.t ? window.t('sd_scope_game') : 'A game') + '</option>';
    try {
      var r = await fetch('/listSeries'); seriesList = await r.json() || [];
    } catch(e){ seriesList = []; }
  }

  function onScopeChange(){
    var scope = document.getElementById('scopeSelect').value;
    var wrap = document.getElementById('scopeValueWrap');
    var sel = document.getElementById('scopeValueSelect');
    if (scope === 'series') {
      wrap.style.display = '';
      sel.innerHTML = seriesList.map(function(s){ return '<option value="'+esc(s)+'">'+esc(s)+'</option>'; }).join('')
                      || '<option value="">(no series)</option>';
    } else if (scope === 'game') {
      wrap.style.display = '';
      fetch('/getGames').then(function(r){return r.json();}).then(function(g){
        var games = Object.keys(g || {}).sort();
        sel.innerHTML = games.map(function(x){ return '<option value="'+esc(x)+'">'+esc(x)+'</option>'; }).join('')
                        || '<option value="">(no games)</option>';
        recompute();
      });
      return;
    } else {
      wrap.style.display = 'none';
    }
    recompute();
  }

  function onDecayChange(){
    var mode = document.getElementById('decaySelect').value;
    document.getElementById('thresholdWrap').style.display = (mode === 'absence') ? '' : 'none';
    document.getElementById('recencyWrap').style.display = (mode === 'recency') ? '' : 'none';
    recompute();
  }

  function settings(){
    var scope = document.getElementById('scopeSelect').value;
    return {
      slug: document.getElementById('slugInput').value.trim(),
      scope_type: scope,
      scope_value: (scope === 'all') ? '' : document.getElementById('scopeValueSelect').value,
      curve: document.getElementById('curveSelect').value,
      decay_mode: document.getElementById('decaySelect').value,
      threshold: parseInt(document.getElementById('thresholdInput').value, 10) || 2,
      recency_factor: parseFloat(document.getElementById('recencyInput').value) || 0.85,
      early_rounds: parseInt(document.getElementById('rematchRounds').value, 10) || 2,
      check_mode: document.getElementById('checkMode').value,
      rematch_check: document.getElementById('checkMode').value === 'rematch' || document.getElementById('checkMode').value === 'both',
      rematch_recency: parseFloat(document.getElementById('rematchRecency').value) || 0.8,
      rematch_lookback: parseInt(document.getElementById('rematchLookback').value, 10) || 0
    };
  }

  // Fetch entrants (refresh=true re-pulls from start.gg); compute ranking.
  async function fetchSeeding(refresh){
    var s = settings();
    if (!s.slug) { setStatus(window.t ? window.t('sd_need_slug') : 'Paste a start.gg event URL or slug.', true); return; }
    setStatus(window.t ? window.t('sd_fetching') : 'Fetching entrants…');
    s.refresh = !!refresh;
    try {
      var r = await fetch('/seedingCompute', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify(s)
      });
      var data = await r.json();
      if (!data.ok) { setStatus((data.message || 'Error'), true); return; }
      lastResult = data;
      render(data);
    } catch(e){ console.log('fetchSeeding error:', e); setStatus('' + e, true); }
  }

  // Re-rank using already-fetched entrants (no start.gg re-pull).
  function recompute(){
    if (!lastResult) return;       // nothing fetched yet
    fetchSeeding(false);
  }

  function mathDetail(row){
    if (!row.placements || !row.placements.length) return '';
    var pills = row.placements.map(function(d){
      return '<span class="pill">' + esc(d.label) + ': ' + d.placement
           + ' (' + d.raw_points + (d.weight !== 1 ? ' ×' + d.weight : '') + ')</span>';
    }).join('');
    return pills;
  }

  // ── Bracket math (JS port of SeedingRank, kept in sync) ──
  function nextPow2(n){ var p=1; while(p<n) p*=2; return Math.max(p,2); }
  function standardBracketOrder(size){
    var order=[1,2];
    while(order.length<size){
      var m=order.length*2, nxt=[];
      for(var i=0;i<order.length;i++){ nxt.push(order[i]); nxt.push(m+1-order[i]); }
      order=nxt;
    }
    return order;
  }
  function meetingRound(slotA, slotB, size){
    var r=1, block=2;
    while(block<=size){
      if(Math.floor(slotA/block)===Math.floor(slotB/block)) return r;
      r++; block*=2;
    }
    return r;
  }

  // Render the ranked list as a draggable table. Seed numbers reflect current
  // positions in seedOrder; dragging a row reorders and re-checks rematches.
  function renderRankedTable(){
    var html = '<div class="sd-section-title">' + (window.t ? window.t('sd_ranked') : 'Suggested seed order') + '</div>';
    if (!seedOrder.length){
      html += '<div class="sd-empty">' + (window.t ? window.t('sd_none_ranked') : 'No entrants with history in this scope yet.') + '</div>';
      document.getElementById('sdRanked').innerHTML = html;
      return;
    }
    html += '<div class="sd-draghint">' + (window.t?window.t('sd_drag_hint'):'Drag rows to reorder seeds -- rematch check updates live.') + '</div>';
    html += '<table class="sd"><thead><tr>'
      + '<th class="sd-seed">#</th><th>' + (window.t?window.t('sd_col_player'):'Player') + '</th>'
      + '<th class="sd-pts">' + (window.t?window.t('sd_col_points'):'Points') + '</th>'
      + '<th class="sd-evt">' + (window.t?window.t('sd_col_events'):'Events') + '</th>'
      + '<th></th></tr></thead><tbody id="sdRankedBody">';
    seedOrder.forEach(function(row, i){
      var isPromoted = !!promoted[rowKey(row)];
      var ptsCell = isPromoted ? '<span class="sd-math">\u2014</span>' : row.points;
      var evtCell = isPromoted ? '<span class="sd-math">\u2014</span>' : row.events_counted;
      var lastCell = isPromoted
        ? '<span class="sd-return" title="' + (window.t?window.t('sd_return'):'Return to its section') + '" onclick="returnFromSeed(\'' + esc(rowKey(row)).replace(/'/g,"\\'") + '\')">\u21A9</span>'
          + (row.tag || row.player_id ? '' : '')
        : '<span class="sd-math-toggle" onclick="toggleDetail(this)">' + (window.t?window.t('sd_show_math'):'show math') + '</span>';
      html += '<tr class="sd-drag-row' + (isPromoted ? ' sd-promoted' : '') + '" draggable="true" data-idx="' + i + '">'
        + '<td class="sd-seed"><span class="sd-grip">\u2630</span>' + (i+1) + '</td>'
        + '<td>' + esc(row.name) + (row.tag && row.tag.toLowerCase()!==row.name.toLowerCase() ? ' <span class="sd-math">('+esc(row.tag)+')</span>' : '')
          + (isPromoted ? ' <span class="sd-nohist">' + (window.t?window.t('sd_no_history'):'no history') + '</span>' : '') + '</td>'
        + '<td class="sd-pts">' + ptsCell + '</td>'
        + '<td class="sd-evt">' + evtCell + '</td>'
        + '<td>' + lastCell + '</td>'
        + '</tr>'
        + (isPromoted ? '' : '<tr class="sd-detail" style="display:none;"><td></td><td colspan="4">' + mathDetail(row) + '</td></tr>');
    });
    html += '</tbody></table>';
    html += '<div class="sd-copybar">'
      + '<button class="btn sec sm" onclick="copySeedList()" data-i18n="sd_copy">Copy seed order</button>'
      + ' <button class="btn sec sm" onclick="resetSeedOrder()" data-i18n="sd_reset_order">Reset to suggested</button>'
      + ' <button class="btn sec sm" onclick="addAllNoHistory()" data-i18n="sd_add_all_nohist">Add all unseeded</button>'
      + ' <button class="btn sec sm" onclick="saveSeedOrder()" data-i18n="sd_save_order">Save order</button>'
      + '</div>';
    document.getElementById('sdRanked').innerHTML = html;
    wireDragEvents();
  }

  function wireDragEvents(){
    var rows = document.querySelectorAll('#sdRankedBody .sd-drag-row');
    rows.forEach(function(tr){
      tr.addEventListener('dragstart', function(e){
        dragInfo = {source: 'seed', index: parseInt(tr.getAttribute('data-idx'), 10)};
        tr.classList.add('sd-dragging');
        e.dataTransfer.effectAllowed = 'move';
      });
      tr.addEventListener('dragend', function(){ tr.classList.remove('sd-dragging'); });
      tr.addEventListener('dragover', function(e){ e.preventDefault(); tr.classList.add('sd-drop-target'); });
      tr.addEventListener('dragleave', function(){ tr.classList.remove('sd-drop-target'); });
      tr.addEventListener('drop', function(e){
        e.preventDefault();
        tr.classList.remove('sd-drop-target');
        var to = parseInt(tr.getAttribute('data-idx'), 10);
        dropIntoSeed(to);
      });
    });
    // Allow dropping onto the whole seed body (e.g. at the end / empty list).
    var body = document.getElementById('sdRankedBody');
    if (body){
      body.addEventListener('dragover', function(e){ e.preventDefault(); });
      body.addEventListener('drop', function(e){
        // Only handle if the drop didn't land on a specific row.
        if (e.target.closest && e.target.closest('.sd-drag-row')) return;
        e.preventDefault();
        dropIntoSeed(seedOrder.length);
      });
    }
  }

  // Handle a drop at position `to` in the seed list, from either an intra-seed
  // reorder or a section player being promoted in.
  // Build the seed-list row object for a section player and mark it
  // promoted. Shared by drag-in, "Add all unseeded", and saved-order
  // restore. Unmatched entrants carry .tag but no .name.
  function promoteRowObj(row){
    promoted[rowKey(row)] = true;
    var placed = Object.assign({}, row);
    if (!placed.name) placed.name = placed.tag || '';
    if (placed.points === undefined) placed.points = 0;
    if (placed.events_counted === undefined) placed.events_counted = 0;
    return placed;
  }

  // Pull every known-unranked and unmatched player into the seed list,
  // appended at the bottom in their listed order.
  function addAllNoHistory(){
    if (!lastResult) return;
    var added = 0;
    ((lastResult.known_unranked || []).concat(lastResult.unmatched || [])).forEach(function(row){
      if (promoted[rowKey(row)]) return;
      seedOrder.push(promoteRowObj(row));
      added++;
    });
    if (!added) return;
    renderRankedTable();
    renderSections();
    recheckRematches();
    setStatus(added + ' ' + (window.t?window.t('sd_added_nohist'):'player(s) added to the bottom of the seed list.'));
  }

  // ── Saved seed orders (localStorage, keyed by event slug) ──
  // Saving pins your manual arrangement; it AUTO-RESTORES after every
  // recompute, so changing ranking options no longer wipes your work.
  // "Reset to suggested" clears the save (otherwise the next recompute
  // would snap back to it and reset would appear broken).
  var _orderRestored = false;
  function _slugKey(){ return document.getElementById('slugInput').value.trim().toLowerCase(); }
  function _savedOrders(){
    try { return JSON.parse(localStorage.getItem('sd_saved_orders') || '{}'); }
    catch(e){ return {}; }
  }
  function saveSeedOrder(){
    if (!seedOrder.length || !_slugKey()) return;
    var all = _savedOrders();
    all[_slugKey()] = { keys: seedOrder.map(rowKey), saved_at: Date.now() };
    try { localStorage.setItem('sd_saved_orders', JSON.stringify(all)); } catch(e){}
    setStatus(window.t?window.t('sd_order_saved'):'Seed order saved for this event -- it will be restored after recomputes.');
  }
  function clearSavedOrder(){
    var all = _savedOrders();
    if (all[_slugKey()]){ delete all[_slugKey()];
      try { localStorage.setItem('sd_saved_orders', JSON.stringify(all)); } catch(e){} }
  }
  // Reorder the freshly computed list to match the saved key order.
  // Saved players missing from this compute are skipped; new players
  // not in the save keep their computed relative order at the end.
  function applySavedOrder(){
    _orderRestored = false;
    var rec = _savedOrders()[_slugKey()];
    if (!rec || !rec.keys || !rec.keys.length) return;
    var pool = {};
    seedOrder.forEach(function(r){ pool[rowKey(r)] = r; });
    var newOrder = [];
    rec.keys.forEach(function(k){
      if (pool[k]){ newOrder.push(pool[k]); delete pool[k]; return; }
      var row = findSectionRow(k);
      if (row) newOrder.push(promoteRowObj(row));   // was promoted when saved
    });
    seedOrder.forEach(function(r){ var k = rowKey(r); if (pool[k]){ newOrder.push(r); delete pool[k]; } });
    seedOrder = newOrder;
    _orderRestored = true;
  }

  function dropIntoSeed(to){
    if (!dragInfo) return;
    if (dragInfo.source === 'seed'){
      var from = dragInfo.index;
      if (from === to){ dragInfo = null; return; }
      var moved = seedOrder.splice(from, 1)[0];
      if (from < to) to--;                 // account for the removal shift
      seedOrder.splice(to, 0, moved);
    } else {                                // promoting a section player
      var row = findSectionRow(dragInfo.key);
      if (!row){ dragInfo = null; return; }
      var placed = promoteRowObj(row);
      seedOrder.splice(Math.min(to, seedOrder.length), 0, placed);
    }
    dragInfo = null;
    renderRankedTable();      // renumber seeds
    renderSections();         // remove the promoted player from its section
    recheckRematches();       // live re-check with new order
  }

  // Send a promoted player back out of the seed list to its original section.
  function returnFromSeed(key){
    for (var i = 0; i < seedOrder.length; i++){
      if (rowKey(seedOrder[i]) === key){ seedOrder.splice(i, 1); break; }
    }
    delete promoted[key];
    renderRankedTable();
    renderSections();
    recheckRematches();
  }

  function resetSeedOrder(){
    if (!lastResult) return;
    clearSavedOrder();   // else the next recompute would restore it
    _orderRestored = false;
    promoted = {};
    seedOrder = (lastResult.ranked || []).slice();
    renderRankedTable();
    renderSections();
    recheckRematches();
  }

  // Recompute early-rematch AND same-state flags from the current seedOrder,
  // using the pairwise prior-meeting data + player states the server sent --
  // entirely client-side, so it's instant on every drag. Mirrors
  // SeedingRank.detect_rematches / detect_state_clashes.
  function recheckRematches(){
    if (!lastResult){ renderRematches([]); renderStateClashes([]); renderCityClashes([]); return; }
    var mode = document.getElementById('checkMode').value;
    if (mode === 'off'){ renderRematches([]); renderStateClashes([]); renderCityClashes([]); return; }
    var earlyRounds = parseInt(document.getElementById('rematchRounds').value, 10) || 2;

    // Full seed order = current seed list (may already include promoted
    // known-unranked/unmatched players) + any known-unranked NOT yet promoted.
    var tail = (lastResult.known_unranked || []).filter(function(r){ return !promoted[rowKey(r)]; });
    var fullOrder = seedOrder.concat(tail);
    var seedOf = {};
    fullOrder.forEach(function(r, i){ if (r.player_id) seedOf[r.player_id] = i + 1; });

    var size = nextPow2(fullOrder.length);
    var bracket = standardBracketOrder(size);
    var slotOfSeed = {};
    bracket.forEach(function(seed, slot){ slotOfSeed[seed] = slot; });

    // ── Rematch check ──
    if (mode === 'rematch' || mode === 'both' || mode === 'all' || mode === 'rematch_state' || mode === 'rematch_city'){
      var recency = parseFloat(document.getElementById('rematchRecency').value) || 0.8;
      var lookback = parseInt(document.getElementById('rematchLookback').value, 10) || 0;
      var pairs = lastResult.pair_history || [];
      var flags = [];
      pairs.forEach(function(p){
        if (lookback && p.events_ago >= lookback) return;
        var sa = seedOf[p.a_id], sb = seedOf[p.b_id];
        if (!sa || !sb) return;
        var slotA = slotOfSeed[sa], slotB = slotOfSeed[sb];
        if (slotA === undefined || slotB === undefined) return;
        var rnd = meetingRound(slotA, slotB, size);
        if (rnd > earlyRounds) return;
        var rweight = Math.pow(recency, p.events_ago);
        var severity = (earlyRounds - rnd + 1) * rweight;
        flags.push({ a_seed: sa, a_name: p.a_name, b_seed: sb, b_name: p.b_name,
          round: rnd, events_ago: p.events_ago, last_label: p.label,
          last_date: p.date, meetings: p.count, recency_weight: Math.round(rweight*1000)/1000,
          severity: severity });
      });
      flags.sort(function(a,b){ return b.severity - a.severity; });
      renderRematches(flags);
    } else {
      renderRematches([]);
    }

    // ── Same-state check ──
    if (mode === 'state' || mode === 'both' || mode === 'all' || mode === 'rematch_state'){
      var states = lastResult.player_states || {};
      // group seeded players by normalized state
      var byState = {};
      fullOrder.forEach(function(r){
        var pid = r.player_id; if (!pid) return;
        var st = (states[pid] || '').trim();
        if (!st) return;
        (byState[st.toLowerCase()] = byState[st.toLowerCase()] || []).push({pid: pid, name: r.name, st: st});
      });
      var sflags = [];
      Object.keys(byState).forEach(function(k){
        var grp = byState[k];
        for (var i=0;i<grp.length;i++){ for (var j=i+1;j<grp.length;j++){
          var a=grp[i], b=grp[j];
          var sa=seedOf[a.pid], sb=seedOf[b.pid];
          var slotA=slotOfSeed[sa], slotB=slotOfSeed[sb];
          if (slotA===undefined||slotB===undefined) continue;
          var rnd=meetingRound(slotA, slotB, size);
          if (rnd>earlyRounds) continue;
          sflags.push({ a_seed:sa, a_name:a.name, b_seed:sb, b_name:b.name,
            state:a.st, round:rnd, severity:(earlyRounds-rnd+1) });
        }}
      });
      sflags.sort(function(a,b){ return b.severity - a.severity; });
      renderStateClashes(sflags);
    } else {
      renderStateClashes([]);
    }

    // ── Same-city check ──
    if (mode === 'city' || mode === 'all' || mode === 'rematch_city'){
      var cities = lastResult.player_cities || {};
      var cstates = lastResult.player_states || {};
      var cstateIds = lastResult.player_state_ids || {};
      function stateKeyOf(pid){
        var sid = cstateIds[pid];
        if (sid !== null && sid !== undefined && sid !== '') return 'id:' + sid;
        var st = (cstates[pid] || '').trim();
        return st ? ('txt:' + st.toLowerCase()) : '';
      }
      var byCity = {};
      fullOrder.forEach(function(r){
        var pid = r.player_id; if (!pid) return;
        var ct = (cities[pid] || '').trim();
        if (!ct) return;
        (byCity[ct.toLowerCase()] = byCity[ct.toLowerCase()] || []).push({pid: pid, name: r.name, ct: ct});
      });
      var cflags = [];
      Object.keys(byCity).forEach(function(k){
        var grp = byCity[k];
        for (var i=0;i<grp.length;i++){ for (var j=i+1;j<grp.length;j++){
          var a=grp[i], b=grp[j];
          var ka=stateKeyOf(a.pid), kb=stateKeyOf(b.pid);
          if (ka && kb && ka !== kb) continue;   // same city name, different states
          var sa=seedOf[a.pid], sb=seedOf[b.pid];
          var slotA=slotOfSeed[sa], slotB=slotOfSeed[sb];
          if (slotA===undefined||slotB===undefined) continue;
          var rnd=meetingRound(slotA, slotB, size);
          if (rnd>earlyRounds) continue;
          cflags.push({ a_seed:sa, a_name:a.name, b_seed:sb, b_name:b.name,
            city:a.ct, round:rnd, severity:(earlyRounds-rnd+1) });
        }}
      });
      cflags.sort(function(a,b){ return b.severity - a.severity; });
      renderCityClashes(cflags);
    } else {
      renderCityClashes([]);
    }
  }

  function renderRematches(flags){
    var box = document.getElementById('sdRematches');
    if (!flags || !flags.length){ box.innerHTML = ''; return; }
    var title = window.t ? window.t('sd_rematch_title') : 'Possible early rematches';
    var sub = window.t ? window.t('sd_rematch_sub') : 'These seeded players have played before and would meet early under standard (opposite-ends) placement. Nudge their seeds apart if you want to avoid it.';
    var h = '<div class="sd-rematch-card"><div class="sd-rematch-head">\u26A0 ' + esc(title) + '</div>'
      + '<div class="sd-rematch-sub">' + esc(sub) + '</div><table class="sd"><thead><tr>'
      + '<th>' + (window.t?window.t('sd_rematch_col_round'):'Round') + '</th>'
      + '<th>' + (window.t?window.t('sd_rematch_col_players'):'Players') + '</th>'
      + '<th>' + (window.t?window.t('sd_rematch_col_last'):'Last met') + '</th>'
      + '</tr></thead><tbody>';
    flags.forEach(function(f){
      var when = f.last_date || (f.events_ago === 0 ? (window.t?window.t('sd_rematch_latest'):'most recent event') : (f.events_ago + ' ' + (window.t?window.t('sd_rematch_ago'):'events ago')));
      var times = f.meetings > 1 ? ' <span class="sd-math">(' + f.meetings + '\u00D7)</span>' : '';
      h += '<tr>'
        + '<td class="sd-seed">R' + f.round + '</td>'
        + '<td><strong>#' + f.a_seed + '</strong> ' + esc(f.a_name) + ' <span class="sd-math">vs</span> <strong>#' + f.b_seed + '</strong> ' + esc(f.b_name) + '</td>'
        + '<td>' + esc(when) + times + '</td>'
        + '</tr>';
    });
    h += '</tbody></table></div>';
    box.innerHTML = h;
  }

  function renderStateClashes(flags){

    var sub = window.t ? window.t('sd_state_sub') : 'These seeded players are from the same state/region and would meet early. Spread out regionals if you want to avoid it.';
    var h = '<div class="sd-rematch-card sd-state-card"><div class="sd-rematch-head sd-state-head">\u26A0 ' + esc(title) + '</div>'

      + '<th>' + (window.t?window.t('sd_rematch_col_round'):'Round') + '</th>'
      + '<th>' + (window.t?window.t('sd_rematch_col_players'):'Players') + '</th>'

        + '<td>' + esc(f.state) + '</td>'

  function renderCityClashes(flags){
    var box = document.getElementById('sdCityClashes');
    if (!flags || !flags.length){ box.innerHTML = ''; return; }
    var title = window.t ? window.t('sd_city_title') : 'Possible same-city early meetings';
    var sub = window.t ? window.t('sd_city_sub') : 'These seeded players are from the same city and would meet early. At state-heavy events this is the sharper local signal.';
    var h = '<div class="sd-rematch-card sd-city-card"><div class="sd-rematch-head sd-city-head">\u26A0 ' + esc(title) + '</div>'
      + '<div class="sd-rematch-sub">' + esc(sub) + '</div><table class="sd"><thead><tr>'
      + '<th>' + (window.t?window.t('sd_rematch_col_round'):'Round') + '</th>'
      + '<th>' + (window.t?window.t('sd_rematch_col_players'):'Players') + '</th>'
      + '<th>' + (window.t?window.t('sd_city_col'):'City') + '</th>'
      + '</tr></thead><tbody>';

      h += '<tr>'
        + '<td class="sd-seed">R' + f.round + '</td>'
        + '<td><strong>#' + f.a_seed + '</strong> ' + esc(f.a_name) + ' <span class="sd-math">vs</span> <strong>#' + f.b_seed + '</strong> ' + esc(f.b_name) + '</td>'
        + '<td>' + esc(f.city) + '</td>'
        + '</tr>';

  function render(data){
    // Working copy of the ranked order that drag-and-drop mutates. Known-
    // unranked and unmatched players can also be dragged in (tracked in
    // `promoted`). A fresh compute resets any manual promotion.
    promoted = {};
    seedOrder = (data.ranked || []).slice();
    applySavedOrder();   // pinned manual order survives recomputes
    renderRankedTable();
    renderSections();     // known-unranked + unmatched (minus promoted)
    recheckRematches();   // uses seedOrder + data.pair_history
    // status + coverage warning
    renderStatus(data);
  }

  // Render the known-unranked and unmatched sections. Both are draggable INTO
  // the seed list; players already promoted into the seed list are filtered out
  // here so they aren't shown twice.
  function renderSections(){
    var data = lastResult || {};
    // ── Known but unranked (matched, no history) ──
    var ku = (data.known_unranked || []).filter(function(r){ return !promoted[rowKey(r)]; });
    var h2 = '';
    if (ku.length) {
      h2 = '<div class="sd-section-title">' + (window.t?window.t('sd_known_unranked'):'Known players, no history in scope') + '</div>'
         + '<div class="sd-hint">' + (window.t?window.t('sd_known_unranked_hint'):'These entrants are in your player DB but have no results in the chosen scope — place them manually.') + '</div>'
         + '<div class="sd-draghint">' + (window.t?window.t('sd_drag_in_hint'):'Drag a player up into the seed order to place them.') + '</div>'
         + '<table class="sd"><tbody id="sdKuBody">';
      ku.forEach(function(row){
        h2 += '<tr class="sd-section-row" draggable="true" data-key="' + esc(rowKey(row)) + '" data-origin="ku">'
          + '<td><span class="sd-grip">\u2630</span>' + esc(row.name)
          + (row.tag && row.tag.toLowerCase()!==row.name.toLowerCase() ? ' <span class="sd-math">('+esc(row.tag)+')</span>' : '')
          + '</td></tr>';
      });
      h2 += '</tbody></table>';
    }
    document.getElementById('sdKnownUnranked').innerHTML = h2;

    // ── Unmatched (reconcile) ──
    var umAll = data.unmatched || [];
    var h3 = '';
    var anyShown = umAll.some(function(ent){ return !promoted['t:' + (ent.tag || '')]; });
    if (anyShown) {
      h3 = '<div class="sd-section-title">' + (window.t?window.t('sd_unmatched'):'Unmatched entrants') + '</div>'
         + '<div class="sd-hint">' + (window.t?window.t('sd_unmatched_hint'):'These entrants don\'t match a local player. Assign each to an existing player or create a new one.') + '</div>'
         + '<div class="sd-draghint">' + (window.t?window.t('sd_drag_in_hint'):'Drag a player up into the seed order to place them.') + '</div>'
         + '<table class="sd"><thead><tr><th>' + (window.t?window.t('sd_col_entrant'):'start.gg entrant') + '</th><th>' + (window.t?window.t('sd_col_action'):'Action') + '</th></tr></thead><tbody id="sdUmBody">';
      umAll.forEach(function(ent, i){
        if (promoted['t:' + (ent.tag || '')]) return;   // dragged into seed list
        var opts = '<option value="">' + (window.t?window.t('sd_select_player'):'— select player —') + '</option>'
          + localPlayers.map(function(p){ return '<option value="'+esc(p.id)+'">'+esc(p.name)+'</option>'; }).join('');
        h3 += '<tr class="sd-section-row" draggable="true" data-key="' + esc('t:'+(ent.tag||'')) + '" data-origin="um" data-umidx="' + i + '">'
          + '<td><span class="sd-grip">\u2630</span>' + esc(ent.tag) + '</td><td>'
          + '<span class="sd-recon">'
            + '<select id="recon'+i+'">' + opts + '</select>'
            + '<button class="btn sec sm" onclick="reconAssign('+i+')" data-i18n="sd_assign">Assign</button>'
            + '<button class="btn sec sm" onclick="reconCreate('+i+')" data-i18n="sd_create">Create new</button>'
          + '</span></td></tr>';
      });
      h3 += '</tbody></table>';
    }
    document.getElementById('sdUnmatched').innerHTML = h3;
    wireSectionDrag();
    if (window.applyTranslations) window.applyTranslations(document);
  }

  function renderStatus(data){
    var cov = data.coverage || {};
    var msg = (window.t?window.t('sd_loaded'):'Loaded') + ' ' + data.entrant_count + ' '
            + (window.t?window.t('sd_entrants'):'entrants') + ' · ' + cov.events_in_scope + ' '
            + (window.t?window.t('sd_events_in_scope'):'events in scope');
    var warn = false;
    if (document.getElementById('decaySelect').value === 'absence' && cov.events_in_scope < 3) {
      msg += ' · ' + (window.t?window.t('sd_sparse_warn'):'Few events in scope — by-absence decay needs the series imported fairly completely to be accurate.');
      warn = true;
    }
    if (_orderRestored) msg += ' \u00B7 ' + (window.t?window.t('sd_order_restored'):'saved seed order restored');
    setStatus(msg, warn);
  }

  // Make section rows draggable so they can be dropped into the seed list.
  function wireSectionDrag(){
    document.querySelectorAll('.sd-section-row').forEach(function(tr){
      tr.addEventListener('dragstart', function(e){
        dragInfo = {source: 'section', key: tr.getAttribute('data-key'),
                    origin: tr.getAttribute('data-origin')};
        tr.classList.add('sd-dragging');
        e.dataTransfer.effectAllowed = 'move';
      });
      tr.addEventListener('dragend', function(){ tr.classList.remove('sd-dragging'); });
    });
  }

  // Look up a section row object by its identity key.
  function findSectionRow(key){
    var data = lastResult || {};
    var all = (data.known_unranked || []).concat(data.unmatched || []);
    for (var i = 0; i < all.length; i++){ if (rowKey(all[i]) === key) return all[i]; }
    return null;
  }



  function toggleDetail(span){
    var detailRow = span.closest('tr').nextElementSibling;
    if (!detailRow) return;
    var shown = detailRow.style.display !== 'none';
    detailRow.style.display = shown ? 'none' : '';
    span.textContent = shown ? (window.t?window.t('sd_show_math'):'show math')
                             : (window.t?window.t('sd_hide_math'):'hide math');
  }

  function copySeedList(){
    if (!seedOrder || !seedOrder.length) return;
    // Copy the CURRENT order (including any manual drag reordering).
    var lines = seedOrder.map(function(r, i){ return (i+1) + '. ' + r.name; });
    var text = lines.join('\n');
    if (navigator.clipboard) navigator.clipboard.writeText(text);
    setStatus(window.t ? window.t('sd_copied') : 'Seed order copied.');
  }

  async function reconAssign(i){
    var ent = lastResult.unmatched[i];
    var pid = document.getElementById('recon'+i).value;
    if (!pid) return;
    await doReconcile({tag: ent.tag, user_id: ent.user_id, action: 'existing', player_id: pid});
  }
  async function reconCreate(i){
    var ent = lastResult.unmatched[i];
    await doReconcile({tag: ent.tag, user_id: ent.user_id, action: 'new'});
  }
  async function doReconcile(body){
    try {
      var r = await fetch('/seedingReconcile', {
        method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)
      });
      var data = await r.json();
      if (!data.ok) { setStatus((data.message||'Reconcile failed'), true); return; }
      await loadLocalPlayers();   // new/updated player available in dropdowns
      recompute();                // re-resolve & re-rank with the new match
    } catch(e){ console.log('reconcile error:', e); setStatus(''+e, true); }
  }

  // ── Location pull + review ──
  var locReviewRows = [];   // current review rows, with a `.include` flag

  async function pullLocations(){
    var slug = document.getElementById('slugInput').value.trim();
    if (!slug){ setStatus(window.t?window.t('sd_need_slug'):'Enter a tournament/event first.', true); return; }
    setStatus(window.t?window.t('sd_loc_pulling'):'Pulling locations from start.gg...');
    try {
      var r = await fetch('/locationReview', {
        method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({slug: slug})
      });
      var data = await r.json();
      if (!data.ok){ setStatus(data.message||'Pull failed', true); return; }
      locReviewRows = (data.review||[]).map(function(row){
        row.include = !row.is_flagged;   // clean fills pre-checked; flagged left for the TO
        return row;
      });
      renderLocReview(data);
      setStatus('');
    } catch(e){ console.log('pullLocations error:', e); setStatus(''+e, true); }
  }

  function renderLocReview(data){
    var summary = document.getElementById('locReviewSummary');
    summary.textContent = (window.t?window.t('sd_loc_summary'):'Found locations for review')
      + ': ' + data.needs_review + ' / ' + data.total_entrants
      + (data.flagged ? '  (\u26A0 ' + data.flagged + ' ' + (window.t?window.t('sd_loc_flagged'):'flagged') + ')' : '');
    if (!locReviewRows.length){
      var emptyMsg = (data.with_location === 0)
        ? (window.t?window.t('sd_loc_none_returned'):'start.gg returned no location data for these entrants.')
        : (window.t?window.t('sd_loc_nothing'):'Nothing to update -- every matched player already has matching location data.');
      document.getElementById('locReviewBody').innerHTML =
        '<div class="sd-empty">' + emptyMsg + '</div>';
    } else {
      var h = '<table class="sd loc-table"><thead><tr>'
        + '<th></th>'
        + '<th>' + (window.t?window.t('sd_loc_col_player'):'Player') + '</th>'
        + '<th>' + (window.t?window.t('sd_loc_col_current'):'Current') + '</th>'
        + '<th>' + (window.t?window.t('sd_loc_col_sgg'):'start.gg') + '</th>'
        + '<th>' + (window.t?window.t('sd_loc_col_save'):'Save as') + '</th>'
        + '</tr></thead><tbody>';
      locReviewRows.forEach(function(row, i){
        var badge = '';
        if (row.status === 'conflict') badge = '<span class="loc-badge loc-conflict" data-i18n="sd_loc_conflict">conflict</span>';
        else if (row.status === 'nonstandard') badge = '<span class="loc-badge loc-nonstd" data-i18n="sd_loc_nonstd">non-standard</span>';
        else if (row.status === 'fill') badge = '<span class="loc-badge loc-fill" data-i18n="sd_loc_fill">new</span>';
        var unmatched = !row.player_id;
        var curTxt = (row.current_country ? row.current_country + ' \u00B7 ' : '')
                   + (row.current_state||'') + (row.current_city?(' / '+row.current_city):'');
        var sggCountry = row.sgg_country
          ? '<strong>' + esc(row.sgg_country) + '</strong>'
            + (row.country_inferred ? ' <span class="sd-math" title="' + (window.t?window.t('sd_loc_inferred_tip'):'Inferred from US state') + '">(' + (window.t?window.t('sd_loc_inferred'):'inferred') + ')</span>' : '')
            + ((row.sgg_state || row.sgg_city) ? ' \u00B7 ' : '')
          : '';
        var sggTxt = sggCountry
                   + (row.sgg_state||'')
                   + (row.sgg_city?(' / '+row.sgg_city):'');
        h += '<tr class="' + (row.is_flagged?'loc-flagged-row':'') + '">'
          + '<td>' + (unmatched ? '' : '<input type="checkbox" ' + (row.include?'checked':'') + ' onchange="locToggle('+i+',this.checked)">') + '</td>'
          + '<td>' + esc(row.tag) + ' ' + badge + (unmatched?' <span class="loc-badge loc-unmatched" data-i18n="sd_loc_unmatched">unmatched</span>':'') + '</td>'
          + '<td>' + esc(curTxt) + '</td>'
          + '<td>' + sggTxt + '</td>'
          + '<td>' + (unmatched
              ? '<button class="btn sec sm" onclick="locReconcileNew('+i+')" data-i18n="sd_loc_create">Create profile</button>'
              : '<input type="text" class="loc-edit" value="'+esc(row.proposed_state)+'" onchange="locEdit('+i+',this.value)" style="width:90px;">')
          + '</td>'
          + '</tr>';
      });
      h += '</tbody></table>';
      document.getElementById('locReviewBody').innerHTML = h;
    }
    document.getElementById('locReviewModal').style.display = 'flex';
    if (window.applyTranslations) window.applyTranslations(document);
  }

  function locToggle(i, on){ if (locReviewRows[i]) locReviewRows[i].include = on; }
  function locEdit(i, val){
    if (!locReviewRows[i]) return;
    locReviewRows[i].proposed_state = val.trim();
    // manual edit breaks the canonical id link -- clear it so text is authoritative
    locReviewRows[i].proposed_state_id = null;
    locReviewRows[i].include = true;
  }
  function closeLocReview(){ document.getElementById('locReviewModal').style.display = 'none'; }

  async function locReconcileNew(i){
    var row = locReviewRows[i]; if (!row) return;
    await doReconcile({tag: row.tag, user_id: row.user_id, action: 'new',
                       state: row.proposed_state, state_id: row.proposed_state_id, city: row.sgg_city,
                       country: row.proposed_country});
    // reflect that it's handled
    row.done = true;
    setStatus((window.t?window.t('sd_loc_created'):'Created profile for') + ' ' + row.tag);
    closeLocReview();
  }

  async function applyLocations(){
    var updates = locReviewRows.filter(function(r){ return r.include && r.player_id; })
      .map(function(r){ return {player_id: r.player_id, state: r.proposed_state,
                                state_id: r.proposed_state_id, city: r.proposed_city,
                                country: r.proposed_country}; });
    if (!updates.length){ closeLocReview(); return; }
    try {
      var r = await fetch('/applyLocations', {
        method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({updates: updates})
      });
      var data = await r.json();
      if (!data.ok){ setStatus(data.message||'Save failed', true); return; }
      setStatus((window.t?window.t('sd_loc_saved'):'Saved locations for') + ' ' + data.applied + ' ' + (window.t?window.t('sd_loc_players'):'players'));
      closeLocReview();
      await loadLocalPlayers();
      if (lastResult) recompute();   // re-run so state checks pick up new data
    } catch(e){ console.log('applyLocations error:', e); setStatus(''+e, true); }
  }

  (async function init(){
    await loadLocalPlayers();
    await loadScopes();
    onScopeChange();
    onDecayChange();
  })();

  window.onLangChange = function(){
    if (window.applyTranslations) window.applyTranslations(document);
    if (lastResult) render(lastResult);
  };
</script>
  <script src="../lang/en.js"></script>
  <script src="../i18n.js"></script>
  <script src="../nav.js"></script>
  <script src="../theme/theme.js" defer></script>
</body>
</html>
