<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Players &amp; Commentators — Stream Overlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="../images/V.png">
  <link href="style.css" rel="stylesheet" type="text/css">
  <script>
    // Apply saved theme before paint to prevent flash
    (function(){var s=localStorage.getItem('sc_theme');if(!s)return;try{var v=JSON.parse(s);Object.keys(v).forEach(function(k){document.documentElement.style.setProperty(k,v[k])});}catch(e){}})();
  </script>
  <link href="../theme/theme.css" rel="stylesheet" type="text/css">
</head>
<body>

<!-- NAV -->
<div class="top-navbar-container">
  <div class="header-item"><a href="../commentators/commentators.html">Commentators</a></div>
  <span class="header-sep">|</span>
  <div class="header-item"><a href="../index.html">Event Dashboard</a></div>
  <span class="header-sep">|</span>
  <div class="header-item"><a href="../top8/top8.html">Top 8</a></div>
  <span class="header-sep">|</span>
  <div class="header-item"><a href="../playerinfo/characterselect.html">Character Select</a></div>
  <span class="header-sep">|</span>
  <div class="header-item"><a href="../stations/stations.html">Stations</a></div>
  <span class="header-sep">|</span>
  <div class="header-item active">Players</div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="toolbar-left">
    <input type="text" id="searchInput" placeholder="Search players…" oninput="renderTable()">
    <button class="btn" onclick="openAddModal()">+ Add Player</button>
  </div>
  <div class="toolbar-right">
    <span class="player-count" id="playerCount"></span>
    <button class="btn sec sm" onclick="cleanupDuplicates()">🧹 Clean Duplicates</button>
    <button class="btn sec sm" onclick="loadPlayers()">↺ Refresh</button>
  </div>
</div>

<!-- TABLE -->
<div class="content">
  <div id="tableWrap">
    <div class="empty-state"><span class="spinner"></span> Loading…</div>
  </div>
</div>

<!-- ADD / EDIT MODAL -->
<div class="modal-backdrop" id="modal" onclick="onBackdropClick(event)">
  <div class="modal-content">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Add Player</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="field-group">
        <label for="mName">Name</label>
        <input type="text" id="mName" placeholder="Gamer tag">
      </div>
      <div class="field-group">
        <label for="mTeam">Team</label>
        <input type="text" id="mTeam" placeholder="Team name or abbreviation">
      </div>
      <div class="field-group">
        <label for="mCountry">Country</label>
        <select id="mCountry"></select>
      </div>
      <div class="field-group">
        <label>Social Media</label>
        <div class="social-row">
          <select id="mSocialPlatform">
            <option value="">— Platform —</option>
            <option value="twitter">Twitter</option>
            <option value="bluesky">Bluesky</option>
            <option value="instagram">Instagram</option>
            <option value="facebook">Facebook</option>
            <option value="twitch">Twitch</option>
          </select>
          <input type="text" id="mSocialHandle" placeholder="@handle" style="flex:1;">
        </div>
      </div>
      <div class="field-group" style="flex-direction:row;align-items:center;gap:8px;">
        <input type="checkbox" id="mIsCommentator" style="width:14px;height:14px;accent-color:var(--accent);flex-shrink:0;">
        <label for="mIsCommentator" style="font-family:var(--font-d);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--fg2);cursor:pointer;">Commentator</label>
      </div>
      <div class="field-group" id="mCharactersSection" style="display:none;">
        <label>Characters</label>
        <div style="display:flex;gap:6px;align-items:center;">
          <select id="mCharGameSelect" onchange="mCharGameChanged()" style="flex:1;">
            <option value="">— Select game —</option>
          </select>
          <button class="btn sec" onclick="mCharDeleteGame()" style="padding:4px 8px;font-size:10px;" title="Remove this game's character">✕</button>
        </div>
        <div id="mCharDisplay" style="display:none;margin-top:6px;align-items:center;gap:8px;padding:6px;background:var(--bg3);border-radius:4px;">
          <img id="mCharPortrait" style="width:48px;height:48px;object-fit:contain;image-rendering:pixelated;border-radius:3px;" src="">
          <div>
            <div id="mCharName" style="font-family:var(--font-d);font-size:13px;font-weight:700;color:var(--fg);text-transform:capitalize;"></div>
            <div id="mCharDetail" style="font-family:var(--font-d);font-size:10px;color:var(--fg2);margin-top:2px;"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn sec" onclick="closeModal()">Cancel</button>
      <button class="btn" id="modalSaveBtn" onclick="saveModal()">Save</button>
    </div>
  </div>
</div>

<!-- DELETE CONFIRM -->
<div class="modal-backdrop" id="deleteModal" onclick="onDeleteBackdropClick(event)">
  <div class="modal-content modal-sm">
    <div class="modal-header">
      <span class="modal-title">Delete Player</span>
      <button class="modal-close" onclick="closeDeleteModal()">×</button>
    </div>
    <div class="modal-body">
      <p style="color:var(--fg);font-size:14px;">Delete <strong id="deletePlayerName" style="color:var(--accent2);"></strong>?</p>
      <p style="color:var(--fg2);font-size:12px;margin-top:6px;">This cannot be undone.</p>
    </div>
    <div class="modal-footer">
      <button class="btn sec" onclick="closeDeleteModal()">Cancel</button>
      <button class="btn danger" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<script>
const countries = [
  '','AF','AL','DZ','AR','AU','AT','AZ','BE','BO','BR','CA','CL','CN','CO',
  'HR','CZ','DK','EC','EG','EE','FI','FR','DE','GH','GR','GT','HN','HK',
  'HU','IN','ID','IE','IL','IT','JP','KZ','KE','KR','KW','LV','LT','MY',
  'MX','MA','NL','NZ','NG','NO','PK','PE','PH','PL','PT','PR','QA','RO',
  'RU','SA','RS','SG','SK','ZA','ES','SE','CH','TW','TH','TR','UA','GB',
  'US','UY','VE','VN'
];

let _players = [];
let _editingOrigName = null;

// Populate country selects
function populateCountrySelect(sel, selected) {
  sel.innerHTML = countries.map(c =>
    `<option value="${c}"${c === selected ? ' selected' : ''}>${c || '— None —'}</option>`
  ).join('');
}
populateCountrySelect(document.getElementById('mCountry'), '');

// ── LOAD ──────────────────────────────────────────────────────────
async function cleanupDuplicates() {
  if (!confirm('Remove all entries without a proper player ID? This will clean up any duplicate name-keyed entries.')) return;
  try {
    const res = await fetch('/cleanupLocalPlayers', { method: 'POST' });
    const data = await res.json();
    if (data.removed === 0) {
      alert('No duplicates found — database is clean.');
    } else {
      alert(`Removed ${data.removed} duplicate entr${data.removed === 1 ? 'y' : 'ies'}: ${data.keys.join(', ')}`);
    }
    await loadPlayers();
  } catch(e) { console.error('Cleanup error:', e); }
}

async function loadPlayers() {
  try {
    const res = await fetch('/getLocalPlayers');
    _players = await res.json();
    renderTable();
  } catch(e) {
    document.getElementById('tableWrap').innerHTML =
      '<div class="empty-state"><strong>Could not load players</strong><div class="hint">Make sure the server is running.</div></div>';
  }
}

// ── RENDER TABLE ──────────────────────────────────────────────────
function renderTable() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const filtered = q
    ? _players.filter(p => (p.name||'').toLowerCase().includes(q) ||
                           (p.team||'').toLowerCase().includes(q) ||
                           (p.country||'').toLowerCase().includes(q))
    : _players;

  document.getElementById('playerCount').textContent =
    filtered.length + ' of ' + _players.length + ' player' + (_players.length !== 1 ? 's' : '');

  if (!filtered.length) {
    document.getElementById('tableWrap').innerHTML = q
      ? '<div class="empty-state"><strong>No results</strong><div class="hint">Try a different search term.</div></div>'
      : '<div class="empty-state"><strong>No players saved yet</strong><div class="hint">Player names are saved automatically when you enter them on the Event Dashboard or Top 8.</div></div>';
    return;
  }

  let html = `<table class="player-table">
    <thead><tr>
      <th class="col-id">ID</th>
      <th onclick="sortBy('name')" class="sortable">Name <span class="sort-icon">⇅</span></th>
      <th onclick="sortBy('team')" class="sortable">Team <span class="sort-icon">⇅</span></th>
      <th onclick="sortBy('country')" class="sortable">Country <span class="sort-icon">⇅</span></th>
      <th onclick="sortBy('social_handle')" class="sortable">Social <span class="sort-icon">⇅</span></th>
      <th class="col-com">Com</th>
      <th class="col-actions">Actions</th>
    </tr></thead><tbody>`;

  filtered.forEach(function(p) {
    const name    = escHtml(p.name    || '');
    const team    = escHtml(p.team    || '');
    const country = escHtml(p.country || '');
    html += `<tr>
      <td class="col-id">${escHtml(p.id || '')}</td>
      <td class="col-name">${name}</td>
      <td class="col-team">${team ? `<span class="team-badge">${team}</span>` : '<span class="cell-empty">—</span>'}</td>
      <td class="col-country">${country || '<span class="cell-empty">—</span>'}</td>
      <td class="col-socials">${p.social_handle
        ? `<span class="platform-badge platform-${escHtml(p.social_platform||'')}">${platformIcon(p.social_platform)}${escHtml(p.social_handle)}</span>`
        : '<span class="cell-empty">—</span>'}</td>
      <td class="col-com">${p.is_commentator ? '<span style="color:var(--accent);">✓</span>' : ''}</td>
      <td class="col-actions">
        <button class="action-btn edit-btn" onclick="openEditModal('${escAttr(p.id || p.name)}')">✎ Edit</button>
        <button class="action-btn del-btn"  onclick="openDeleteModal('${escAttr(p.id || p.name)}', '${escAttr(p.name)}')">✕</button>
      </td>
    </tr>`;
  });

  html += '</tbody></table>';
  document.getElementById('tableWrap').innerHTML = html;
}

let _sortKey = 'name', _sortAsc = true;
function sortBy(key) {
  if (_sortKey === key) { _sortAsc = !_sortAsc; }
  else { _sortKey = key; _sortAsc = true; }
  _players.sort(function(a, b) {
    const av = (a[key] || '').toLowerCase();
    const bv = (b[key] || '').toLowerCase();
    return _sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
  });
  renderTable();
}

// ── ADD MODAL ─────────────────────────────────────────────────────
function openAddModal() {
  _editingOrigName = null;
  document.getElementById('modalTitle').textContent = 'Add Player';
  window._editingCharacters = {};
  document.getElementById('mCharactersSection').style.display = 'none';
  document.getElementById('mCharDisplay').style.display = 'none';
  document.getElementById('mName').value    = '';
  document.getElementById('mTeam').value    = '';
  document.getElementById('mIsCommentator').checked = false;
  document.getElementById('mSocialHandle').value = '';
  document.getElementById('mSocialPlatform').value = '';
  populateCountrySelect(document.getElementById('mCountry'), '');
  // Populate characters section
  var chars = p.characters || {};
  var games = Object.keys(chars);
  var charSec = document.getElementById('mCharactersSection');
  var gameSelect = document.getElementById('mCharGameSelect');
  gameSelect.innerHTML = '<option value="">— Select game —</option>';
  if (games.length > 0) {
    charSec.style.display = 'flex';
    games.forEach(function(g) {
      var opt = document.createElement('option');
      opt.value = g; opt.textContent = g;
      gameSelect.appendChild(opt);
    });
  } else {
    charSec.style.display = 'none';
    document.getElementById('mCharDisplay').style.display = 'none';
  }
  window._editingCharacters = JSON.parse(JSON.stringify(chars)); // deep copy
  document.getElementById('modal').classList.add('open');
  document.getElementById('mName').focus();
}

function mCharGameChanged() {
  var game = document.getElementById('mCharGameSelect').value;
  var chars = window._editingCharacters || {};
  var saved = game ? chars[game] : null;
  var display = document.getElementById('mCharDisplay');
  if (saved && saved.file) {
    document.getElementById('mCharPortrait').src = '/' + saved.file;
    document.getElementById('mCharName').textContent = saved.character + ' (palette ' + saved.palette + ')';
    document.getElementById('mCharDetail').textContent = saved.pack + ' · ' + game;
    display.style.display = 'flex';
  } else {
    display.style.display = 'none';
  }
}

function mCharDeleteGame() {
  var game = document.getElementById('mCharGameSelect').value;
  if (!game || !window._editingCharacters) return;
  if (!confirm('Remove ' + game + ' character data for this player?')) return;
  delete window._editingCharacters[game];
  // Rebuild dropdown
  var gameSelect = document.getElementById('mCharGameSelect');
  var games = Object.keys(window._editingCharacters);
  gameSelect.innerHTML = '<option value="">— Select game —</option>';
  games.forEach(function(g) {
    var opt = document.createElement('option');
    opt.value = g; opt.textContent = g;
    gameSelect.appendChild(opt);
  });
  if (games.length > 0) {
    gameSelect.value = games[0];
    mCharGameChanged();
  } else {
    document.getElementById('mCharDisplay').style.display = 'none';
    document.getElementById('mCharactersSection').style.display = 'none';
  }
}

function openEditModal(id) {
  const p = _players.find(function(x) { return (x.id || x.name) === id; });
  if (!p) return;
  _editingOrigName = p.id || p.name;
  document.getElementById('modalTitle').textContent = 'Edit Player';
  document.getElementById('mName').value    = p.name    || '';
  document.getElementById('mTeam').value    = p.team    || '';
  populateCountrySelect(document.getElementById('mCountry'), p.country || '');
  document.getElementById('mIsCommentator').checked = p.is_commentator || false;
  document.getElementById('mSocialHandle').value   = p.social_handle   || '';
  document.getElementById('mSocialPlatform').value = p.social_platform || '';
  // Populate characters section
  var chars = p.characters || {};
  var games = Object.keys(chars);
  var charSec = document.getElementById('mCharactersSection');
  var gameSelect = document.getElementById('mCharGameSelect');
  gameSelect.innerHTML = '<option value="">— Select game —</option>';
  if (games.length > 0) {
    charSec.style.display = 'flex';
    games.forEach(function(g) {
      var opt = document.createElement('option');
      opt.value = g; opt.textContent = g;
      gameSelect.appendChild(opt);
    });
  } else {
    charSec.style.display = 'none';
    document.getElementById('mCharDisplay').style.display = 'none';
  }
  window._editingCharacters = JSON.parse(JSON.stringify(chars)); // deep copy
  document.getElementById('modal').classList.add('open');
  document.getElementById('mName').focus();
}

function mCharGameChanged() {
  var game = document.getElementById('mCharGameSelect').value;
  var chars = window._editingCharacters || {};
  var saved = game ? chars[game] : null;
  var display = document.getElementById('mCharDisplay');
  if (saved && saved.file) {
    document.getElementById('mCharPortrait').src = '/' + saved.file;
    document.getElementById('mCharName').textContent = saved.character + ' (palette ' + saved.palette + ')';
    document.getElementById('mCharDetail').textContent = saved.pack + ' · ' + game;
    display.style.display = 'flex';
  } else {
    display.style.display = 'none';
  }
}

function mCharDeleteGame() {
  var game = document.getElementById('mCharGameSelect').value;
  if (!game || !window._editingCharacters) return;
  if (!confirm('Remove ' + game + ' character data for this player?')) return;
  delete window._editingCharacters[game];
  // Rebuild dropdown
  var gameSelect = document.getElementById('mCharGameSelect');
  var games = Object.keys(window._editingCharacters);
  gameSelect.innerHTML = '<option value="">— Select game —</option>';
  games.forEach(function(g) {
    var opt = document.createElement('option');
    opt.value = g; opt.textContent = g;
    gameSelect.appendChild(opt);
  });
  if (games.length > 0) {
    gameSelect.value = games[0];
    mCharGameChanged();
  } else {
    document.getElementById('mCharDisplay').style.display = 'none';
    document.getElementById('mCharactersSection').style.display = 'none';
  }
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }
function onBackdropClick(e) { if (e.target.id === 'modal') closeModal(); }

async function saveModal() {
  const name    = document.getElementById('mName').value.trim();
  const team    = document.getElementById('mTeam').value.trim();
  const country = document.getElementById('mCountry').value;
  const social_handle     = document.getElementById('mSocialHandle').value.trim();
  const is_commentator    = document.getElementById('mIsCommentator').checked;
  const social_platform = document.getElementById('mSocialPlatform').value;
  if (!name) { document.getElementById('mName').focus(); return; }

  const endpoint = _editingOrigName ? '/updateLocalPlayer' : '/saveLocalPlayer';
  const body = _editingOrigName
    ? { id: _editingOrigName, name, team, country, social_handle, social_platform, is_commentator, characters: window._editingCharacters }
    : { name, team, country, social_handle, social_platform, is_commentator };

  try {
    await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    closeModal();
    await loadPlayers();
  } catch(e) { console.error('Save error:', e); }
}

// ── DELETE MODAL ──────────────────────────────────────────────────
let _deletingName = null;
let _deletingDisplayName = null;
function openDeleteModal(id, name) {
  _deletingName = id || name;
  _deletingDisplayName = name || id;
  document.getElementById('deletePlayerName').textContent = _deletingDisplayName || _deletingName;
  document.getElementById('deleteModal').classList.add('open');
}
function closeDeleteModal() { document.getElementById('deleteModal').classList.remove('open'); }
function onDeleteBackdropClick(e) { if (e.target.id === 'deleteModal') closeDeleteModal(); }

async function confirmDelete() {
  if (!_deletingName) return;
  try {
    await fetch('/deleteLocalPlayer', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: _deletingName })
    });
    closeDeleteModal();
    await loadPlayers();
  } catch(e) { console.error('Delete error:', e); }
}

// ── UTILS ─────────────────────────────────────────────────────────
const PLATFORM_ICONS = {
    twitter:   '../resources/twitter.png',
    bluesky:   '../resources/bsky.png',
    instagram: '../resources/instagram.png',
    facebook:  '../resources/facebook.png',
    twitch:    '../resources/twitch.png',
};
function platformIcon(p) {
    return PLATFORM_ICONS[p]
        ? '<img src="' + PLATFORM_ICONS[p] + '" style="width:16px;height:16px;vertical-align:middle;margin-right:4px;object-fit:contain;">'
        : '';
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s).replace(/'/g,'&apos;').replace(/"/g,'&quot;');
}

// Enter key in player modal
document.getElementById('mName').addEventListener('keydown', function(e) { if (e.key === 'Enter') saveModal(); });
document.getElementById('mTeam').addEventListener('keydown', function(e) { if (e.key === 'Enter') saveModal(); });

// Load on start
loadPlayers();
</script>

  <script src="../theme/theme.js" defer></script>
</body>
</html>
