<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Top 8 Bracket</title>
  <script src="../sync.js"></script>
<script>
    (function(){
      var s = localStorage.getItem('sc_theme_popout');
      if (!s) return;
      try {
        var v = JSON.parse(s);
        Object.keys(v).forEach(function(k){ document.documentElement.style.setProperty(k,v[k]); });
      } catch(e) {}
    })();

  <link href="../theme/theme.css" rel="stylesheet" type="text/css">
  <style>
    /* ── POPOUT OVERRIDES ── */
    body { overflow: auto; }

    /* Hide interactive controls but NOT theme buttons */
    .set-next-btn,
    .score-field,
    .name-picker,
    .bracket-player-label,
    select:not(.name-picker) { display: none !important; }

    button:not(.theme-nav-btn):not(.theme-preset-btn):not(.theme-panel-close):not(.theme-reset-btn) {
      display: none !important;
    }

    /* Make name inputs look like plain text */
    .bracket-player input[type="text"] {
      pointer-events: none;
      border: none !important;
      background: transparent !important;
      box-shadow: none !important;
      outline: none !important;
      cursor: default;
      padding: 0 !important;
    }
    .name-input-wrap { flex: 1; }

    /* Team tag */
    .bracket-team-tag {
      font-size: 11px;
      color: var(--accent);
      font-family: var(--font-d);
      font-weight: 700;
      letter-spacing: .06em;
      margin-right: 5px;
      flex-shrink: 0;
    }

    /* Score display */
    .bracket-score-display {
      font-size: 18px;
      color: var(--fg);
      font-family: var(--font-d);
      font-weight: 700;
      min-width: 24px;
      text-align: right;
      flex-shrink: 0;
    }

    .bracket-player {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    #refresh-indicator {
      position: fixed;
      bottom: 8px;
      right: 12px;
      font-size: 10px;
      color: var(--fg2);
      font-family: var(--font-d);
      letter-spacing: .08em;
      opacity: .4;
    }
  </style>
</head>

<script>
var SLOTS = [
  { id: 'w1',    r: 'r1',  p: 'p1' }, { id: 'w2',    r: 'r1',  p: 'p2' },
  { id: 'w3',    r: 'r2',  p: 'p1' }, { id: 'w4',    r: 'r2',  p: 'p2' },
  { id: 'w1-wf', r: 'r5',  p: 'p1' }, { id: 'w2-wf', r: 'r5',  p: 'p2' },
  { id: 'w1-gf', r: 'r10', p: 'p1' }, { id: 'w2-gf', r: 'r10', p: 'p2' },
  { id: 'l1',    r: 'r3',  p: 'p1' }, { id: 'l2',    r: 'r3',  p: 'p2' },
  { id: 'l3',    r: 'r4',  p: 'p1' }, { id: 'l4',    r: 'r4',  p: 'p2' },
  { id: 'l1-lq', r: 'r6',  p: 'p1' }, { id: 'l2-lq', r: 'r6',  p: 'p2' },
  { id: 'l3-lq', r: 'r7',  p: 'p1' }, { id: 'l4-lq', r: 'r7',  p: 'p2' },
  { id: 'l1-ls', r: 'r8',  p: 'p1' }, { id: 'l2-ls', r: 'r8',  p: 'p2' },
  { id: 'l1-lf', r: 'r9',  p: 'p1' }, { id: 'l2-lf', r: 'r9',  p: 'p2' },
];

function set(id, val) {
  var el = document.getElementById(id);
  if (el) {
    if (el.tagName === 'INPUT') el.value = val || '';
    else el.textContent = val || '';
  }
}

function update(data) {
  if (!data) return;
  SLOTS.forEach(function(s) {
    var p = (data[s.r] && data[s.r][s.p]) ? data[s.r][s.p] : {};
    set('po-name-'  + s.id, p.name  || '');
    set('po-team-'  + s.id, p.team  || '');
    set('po-score-' + s.id, (p.score !== undefined && p.score !== '') ? p.score : '');
  });
  // Grand Finals reset-set scores (r10 score2)
  var gf = data.r10 || {};
  var s2a = (gf.p1 && gf.p1.score2 !== undefined) ? gf.p1.score2 : '';
  var s2b = (gf.p2 && gf.p2.score2 !== undefined) ? gf.p2.score2 : '';
  var hasS2 = (s2a !== '' || s2b !== '');
  _gfHasScore2 = hasS2;
  set('po-score2-w1-gf', s2a);
  set('po-score2-w2-gf', s2b);
  updateGf2Visibility();
}

var _gfResetLive = false;
var _gfHasScore2 = false;
function updateGf2Visibility() {
  var show = _gfResetLive || _gfHasScore2;
  ['po-score2-w1-gf', 'po-score2-w2-gf'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.style.display = show ? '' : 'none';
  });
}

function load() {
  fetch('/getTop8PlayerData')
    .then(function(r) { return r.json(); })
    .then(update)
    .catch(function(e) { console.log('popout error:', e); });
  fetch('/getTop8CurrentNextData')
    .then(function(r) { return r.json(); })
    .then(function(cn) {
      var badge = document.getElementById('gf_reset_badge');
      _gfResetLive = !!(cn && parseInt(cn.currentRound, 10) === 11);
      if (badge) badge.style.display = _gfResetLive ? '' : 'none';
      updateGf2Visibility();
    })
    .catch(function(e) { console.log('popout state error:', e); });
}

load();
if (window.liveSync) {
  liveSync.on('top8', load);
  setInterval(load, 30000);   // slow fallback if the stream drops
} else {
  setInterval(load, 3000);    // no SSE support: original polling
}
</script>

<script src="../theme/theme.js" defer></script>
<script>
// Override theme storage key to be independent from main dashboard
// Must run after theme.js loads
window.addEventListener('load', function() {
  // Patch saveTheme and resetTheme to use popout key
  var _origSave = window.saveTheme;
  window.saveTheme = function(vars) {
    var style = getComputedStyle(document.documentElement);
    var full = {};
    ['--bg','--bg2','--bg3','--bg4','--fg','--fg2','--accent','--accent2',
     '--green','--blue','--purple','--p1-color','--p2-color','--border'].forEach(function(k) {
      full[k] = style.getPropertyValue(k).trim();
    });
    Object.assign(full, vars);
    localStorage.setItem('sc_theme_popout', JSON.stringify(full));
  };
  window.resetTheme = function() {
    localStorage.removeItem('sc_theme_popout');
    applyPreset('HitConfirm Dark');
  };
  // Load popout theme
  var saved = localStorage.getItem('sc_theme_popout');
  if (saved) {
    try {
      var v = JSON.parse(saved);
      Object.keys(v).forEach(function(k){ document.documentElement.style.setProperty(k,v[k]); });
    } catch(e) {}
  }
});
</script>
