<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="com_title">Commentators Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
  <link href="style.css" rel="stylesheet" type="text/css" />
  <link rel="icon" type="image/png" href="../images/V.png">
  <script src="https://kit.fontawesome.com/2c93766a80.js" crossorigin="anonymous"></script>
  <script type="text/javascript" src="../sync.js" defer=""></script>
  <script class="u-script" type="text/javascript" src="commentators.js" defer=""></script>
  <script>
    // Apply saved theme before paint to prevent flash
    (function(){var s=localStorage.getItem('sc_theme');if(!s)return;try{var v=JSON.parse(s);Object.keys(v).forEach(function(k){document.documentElement.style.setProperty(k,v[k])});}catch(e){}})();
  </script>
  <link href="../theme/theme.css" rel="stylesheet" type="text/css">
</head>
<body>
<div id="nav-root" style="min-height:45px"></div>
<div class="page-content">

    <div class="page-header">
      <h2 data-i18n="com_heading">Commentators</h2>
      <div class="header-actions">
        <button class="rectangle_button" onclick="reverseCommentatorNames();" data-i18n="com_swap">⇄ Swap Names</button>
      </div>
    </div>

    <div class="com-grid">

      <!-- Primary -->
      <div class="com-card">
        <div class="com-card-header">Primary</div>
        <div id="com_primary" class="com-fields">
          <div class="field-group">
            <label data-i18n="com_name">Name</label>
            <div class="name-input-wrap"><input class="form_name_1" type="text" id="form_name_1" placeholder="Name" data-i18n-attr="placeholder:com_name" list="com_name_suggestions" onchange="updateCom1();"><select class="name-picker" id="pick_com_1" onchange="pickName('form_name_1',this,updateCom1)"><option value="">▾</option></select></div>
          </div>
          <div class="field-group">
            <label data-i18n="com_social">Social</label>
            <div class="social-preview-row">
              <img class="platform-icon-img" style="width:18px;height:18px;object-fit:contain;display:none;flex-shrink:0;">
              <select id="soc1_platform_sel" onchange="updatePlatform1();">
                <option value="" data-i18n="com_platform">— Platform —</option>
                <option value="twitter">Twitter</option>
                <option value="bluesky">Bluesky</option>
                <option value="instagram">Instagram</option>
                <option value="facebook">Facebook</option>
                <option value="twitch">Twitch</option>
              </select>
              <input class="form_social_1" type="text" id="form_social_1" placeholder="@handle" data-i18n-attr="placeholder:com_handle" onchange="updateSoc1();">
            </div>
          </div>
        </div>
        <div class="player-save-row"><span class="player-match-hint" id="com1MatchHint"></span><button class="player-save-btn" id="com1SaveBtn" onclick="saveCommentatorCard(1)" data-i18n="com_save">Save Commentator</button></div>
        <button class="rectangle_button btn-sec btn-clear" onclick="clearCom1();" data-i18n="com_clear">✕ Clear</button>
      </div>

      <!-- Secondary -->
      <div class="com-card">
        <div class="com-card-header">Secondary</div>
        <div id="com_secondary" class="com-fields">
          <div class="field-group">
            <label data-i18n="com_name">Name</label>
            <div class="name-input-wrap"><input class="form_name_2" type="text" id="form_name_2" placeholder="Name" data-i18n-attr="placeholder:com_name" list="com_name_suggestions" onchange="updateCom2();"><select class="name-picker" id="pick_com_2" onchange="pickName('form_name_2',this,updateCom2)"><option value="">▾</option></select></div>
          </div>
          <div class="field-group">
            <label data-i18n="com_social">Social</label>
            <div class="social-preview-row">
              <img class="platform-icon-img" style="width:18px;height:18px;object-fit:contain;display:none;flex-shrink:0;">
              <select id="soc2_platform_sel" onchange="updatePlatform2();">
                <option value="" data-i18n="com_platform">— Platform —</option>
                <option value="twitter">Twitter</option>
                <option value="bluesky">Bluesky</option>
                <option value="instagram">Instagram</option>
                <option value="facebook">Facebook</option>
                <option value="twitch">Twitch</option>
              </select>
              <input class="form_social_2" type="text" id="form_social_2" placeholder="@handle" data-i18n-attr="placeholder:com_handle" onchange="updateSoc2();">
            </div>
          </div>
        </div>
        <div class="player-save-row"><span class="player-match-hint" id="com2MatchHint"></span><button class="player-save-btn" id="com2SaveBtn" onclick="saveCommentatorCard(2)" data-i18n="com_save">Save Commentator</button></div>
        <button class="rectangle_button btn-sec btn-clear" onclick="clearCom2();" data-i18n="com_clear">✕ Clear</button>
      </div>

    </div>

    <p class="com-hint">Manage commentator profiles on the <a href="../players/players.html">Players</a> page.</p>

  </div>

    <datalist id="com_name_suggestions"></datalist>
  <script src="../lang/en.js"></script>
  <script src="../i18n.js"></script>
  <script src="../nav.js"></script>
  <script src="../theme/theme.js" defer></script>
</body>
</html>
