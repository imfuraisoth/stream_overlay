<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Commentators Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
  <link href="style.css" rel="stylesheet" type="text/css" />
  <link rel="icon" type="image/png" href="../images/V.png">
  <script src="https://kit.fontawesome.com/2c93766a80.js" crossorigin="anonymous"></script>
  <script class="u-script" type="text/javascript" src="commentators.js" defer=""></script>
  <script>
    // Apply saved theme before paint to prevent flash
    (function(){var s=localStorage.getItem('sc_theme');if(!s)return;try{var v=JSON.parse(s);Object.keys(v).forEach(function(k){document.documentElement.style.setProperty(k,v[k])});}catch(e){}})();
  </script>
  <link href="../theme/theme.css" rel="stylesheet" type="text/css">
</head>
<body>

  <div class="top-navbar-container">
    <div class="header-item active"><a href="commentators.html">Commentators</a></div>
    <span class="header-sep">|</span>
    <div class="header-item"><a href="../index.html">Event Dashboard</a></div>
    <span class="header-sep">|</span>
    <div class="header-item"><a href="../top8/top8.html">Top 8</a></div>
    <span class="header-sep">|</span>
    <div class="header-item"><a href="../playerinfo/characterselect.html">Character Select</a></div>
    <span class="header-sep">|</span>
    <div class="header-item"><a href="../stations/stations.html">Stations</a></div>
    <span class="header-sep">|</span>
    <div class="header-item"><a href="../players/players.html">Players</a></div>
  </div>

  <div class="page-content">

    <div class="page-header">
      <h2>Commentators</h2>
      <div class="header-actions">
        <button class="rectangle_button" onclick="reverseCommentatorNames();">⇄ Swap Names</button>
      </div>
    </div>

    <div class="com-grid">

      <!-- Primary -->
      <div class="com-card">
        <div class="com-card-header">Primary</div>
        <div id="com_primary" class="com-fields">
          <div class="field-group">
            <label>Name</label>
            <div class="name-input-wrap"><input class="form_name_1" type="text" id="form_name_1" placeholder="Name" list="com_name_suggestions" onchange="updateCom1();"><select class="name-picker" id="pick_com_1" onchange="pickName('form_name_1',this,updateCom1)"><option value="">▾</option></select></div>
          </div>
          <div class="field-group">
            <label>Social</label>
            <div class="social-preview-row">
              <img class="platform-icon-img" style="width:18px;height:18px;object-fit:contain;display:none;flex-shrink:0;">
              <select id="soc1_platform_sel" onchange="updatePlatform1();">
                <option value="">— Platform —</option>
                <option value="twitter">Twitter</option>
                <option value="bluesky">Bluesky</option>
                <option value="instagram">Instagram</option>
                <option value="facebook">Facebook</option>
              </select>
              <input class="form_social_1" type="text" id="form_social_1" placeholder="@handle" onchange="updateSoc1();">
            </div>
          </div>
        </div>
        <button class="rectangle_button btn-sec btn-clear" onclick="clearCom1();">✕ Clear</button>
      </div>

      <!-- Secondary -->
      <div class="com-card">
        <div class="com-card-header">Secondary</div>
        <div id="com_secondary" class="com-fields">
          <div class="field-group">
            <label>Name</label>
            <div class="name-input-wrap"><input class="form_name_2" type="text" id="form_name_2" placeholder="Name" list="com_name_suggestions" onchange="updateCom2();"><select class="name-picker" id="pick_com_2" onchange="pickName('form_name_2',this,updateCom2)"><option value="">▾</option></select></div>
          </div>
          <div class="field-group">
            <label>Social</label>
            <div class="social-preview-row">
              <img class="platform-icon-img" style="width:18px;height:18px;object-fit:contain;display:none;flex-shrink:0;">
              <select id="soc2_platform_sel" onchange="updatePlatform2();">
                <option value="">— Platform —</option>
                <option value="twitter">Twitter</option>
                <option value="bluesky">Bluesky</option>
                <option value="instagram">Instagram</option>
                <option value="facebook">Facebook</option>
              </select>
              <input class="form_social_2" type="text" id="form_social_2" placeholder="@handle" onchange="updateSoc2();">
            </div>
          </div>
        </div>
        <button class="rectangle_button btn-sec btn-clear" onclick="clearCom2();">✕ Clear</button>
      </div>

    </div>

    <p class="com-hint">Manage commentator profiles on the <a href="../players/players.html">Players</a> page.</p>

  </div>

    <datalist id="com_name_suggestions"></datalist>
  <script src="../theme/theme.js" defer></script>
</body>
</html>
