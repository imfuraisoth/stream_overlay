<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Commentators Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
  <link href="style.css" rel="stylesheet" type="text/css" />
  <link href="popup.css" rel="stylesheet" type="text/css" />
  <link rel="icon" type="image/png" href="../images/V.png">
  <script src="https://kit.fontawesome.com/2c93766a80.js" crossorigin="anonymous"></script>
  <script class="u-script" type="text/javascript" src="commentators.js" defer=""></script>
</head>
<body>

  <!-- TOP NAV -->
  <div class="top-navbar-container">
    <div class="header-item active"><a href="commentators.html">Commentators</a></div>
    <span class="header-sep">|</span>
    <div class="header-item"><a href="../index.html">Event Dashboard</a></div>
    <span class="header-sep">|</span>
    <div class="header-item"><a href="../top8/top8.html">Top 8</a></div>
    <span class="header-sep">|</span>
    <div class="header-item"><a href="../playerinfo/characterselect.html">Character Select</a></div>
    <span class="header-sep">|</span>
    <div class="header-item"><a href="../stations/stations.html">Stations</a></div>
    <span class="header-sep">|</span>
    <div class="header-item"><a href="../players/players.html">Players</a></div>
  </div>

  <!-- CONTENT -->
  <div class="page-content">

    <div class="page-header">
      <h2>Commentators</h2>
      <div class="header-actions">
        <button class="rectangle_button" onclick="reverseCommentatorNames();">⇄ Swap Names</button>
        <button class="rectangle_button btn-sec" id="rectangle_button_add_commentator">+ Add Commentator</button>
        <button class="rectangle_button btn-sec" id="rectangle_button_delete_commentator">− Delete Commentator</button>
      </div>
    </div>

    <!-- Commentator cards -->
    <div class="com-grid">

      <!-- Primary -->
      <div class="com-card">
        <div class="com-card-header">Primary</div>
        <div id="com_primary" class="com-fields">
          <div class="field-group">
            <label>Name</label>
            <input class="form_name_1" type="text" id="form_name_1" placeholder="Name" onchange="updateCom1();">
          </div>
          <div class="field-group">
            <label>Social</label>
            <input class="form_social_1" type="text" id="form_social_1" placeholder="@handle" onchange="updateSoc1();">
          </div>
          <div id="soc1_dropdown"></div>
        </div>
      </div>

      <!-- Secondary -->
      <div class="com-card">
        <div class="com-card-header">Secondary</div>
        <div id="com_secondary" class="com-fields">
          <div class="field-group">
            <label>Name</label>
            <input class="form_name_2" type="text" id="form_name_2" placeholder="Name" onchange="updateCom2();">
          </div>
          <div class="field-group">
            <label>Social</label>
            <input class="form_social_2" type="text" id="form_social_2" placeholder="@handle" onchange="updateSoc2();">
          </div>
          <div id="soc2_dropdown"></div>
        </div>
      </div>

    </div>

  </div>

  <!-- ADD popup -->
  <div id="popupAdd" class="popup">
    <div class="popup-content">
      <button class="close" id="closeAddBtn">&times;</button>
      <p class="popup-title">Add Commentator</p>
      <form id="AddCommentator">
        <div class="field-group">
          <label>Name</label>
          <input type="text" id="commentator_name" name="commentator_name" placeholder="Name" required>
        </div>
        <div class="field-group">
          <label>Social</label>
          <input type="text" id="commentator_social" name="commentator_social" placeholder="@handle" required>
        </div>
        <div class="horizontal-button-container">
          <button type="submit" id="submitButton" onclick="addCommentator();">Submit</button>
        </div>
      </form>
    </div>
  </div>

  <!-- DELETE popup -->
  <div id="popupDelete" class="popup">
    <div class="popup-content">
      <button class="close" id="closeDelBtn">&times;</button>
      <p class="popup-title">Delete Commentator</p>
      <ul id="commentatorsList" style="list-style:none;display:flex;flex-direction:column;gap:6px;padding:0;"></ul>
      <div class="horizontal-button-container" style="margin-top:12px;">
        <button type="submit" id="submitDeleteButton" onclick="deleteCommentator();">Delete Selected</button>
      </div>
    </div>
  </div>

</body>
</html>
