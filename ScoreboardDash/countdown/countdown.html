<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Countdown Control Panel</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
</head>

<body>

<div id="panel">
    <h2>Set Countdown</h2>

    <label for="gameSelect">Game</label>
    <select id="gameSelect"></select>

    <label for="message">Message</label>
    <input type="text" id="message" placeholder="Enter message">

    <label for="timer">Timer (HH:MM:SS)</label>
    <input type="text" id="timer" placeholder="00:00:00" value="00:10:00">

    <button onclick="submitData()">Start Countdown</button>
</div>

<script>
let games = [];

async function loadGames() {
    try {
        const res = await fetch('/getGamesForCountdown');
        games = await res.json(); // Array of strings

        const select = document.getElementById("gameSelect");
        select.innerHTML = "";

        games.forEach((gameName) => {
            const option = document.createElement("option");
            option.value = gameName;
            option.textContent = gameName;
            select.appendChild(option);
        });

    } catch (err) {
        console.error("Failed to load games:", err);
    }
}

function timeToSeconds(timeStr) {
    // Match HH:MM:SS
    const match = timeStr.match(/^(\d{1,2}):(\d{2}):(\d{2})$/);
    if (!match) {
        alert("Invalid time format! Use HH:MM:SS");
        return 0;
    }

    const hours = parseInt(match[1], 10);
    const minutes = parseInt(match[2], 10);
    const seconds = parseInt(match[3], 10);

    return hours * 3600 + minutes * 60 + seconds;
}

async function submitData() {
    const gameName = document.getElementById("gameSelect").value;
    const message = document.getElementById("message").value;
    const timerStr = document.getElementById("timer").value;

    const payload = {
        game_name: gameName,
        icon_file: "", // can fill or leave blank
        message: message,
        timer: timeToSeconds(timerStr)
    };

    try {
        await fetch('/setCountdownInfo', {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        alert("Countdown started!");

    } catch (err) {
        console.error("Failed to submit:", err);
    }
}

// Load games on page start
loadGames();
</script>

</body>
</html>
