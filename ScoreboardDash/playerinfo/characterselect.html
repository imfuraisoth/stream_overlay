<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Character Select Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="../images/V.png">
  <script src="https://kit.fontawesome.com/2c93766a80.js" crossorigin="anonymous"></script>
  <script class="u-script" type="text/javascript" src="characterselect.js" defer=""></script>
  <link href="characterselect.css" rel="stylesheet" type="text/css" />
  <script>
    // Apply saved theme before paint to prevent flash
    (function(){var s=localStorage.getItem('sc_theme');if(!s)return;try{var v=JSON.parse(s);Object.keys(v).forEach(function(k){document.documentElement.style.setProperty(k,v[k])});}catch(e){}})();
  </script>
  <link href="../theme/theme.css" rel="stylesheet" type="text/css">
  <style>.page-content { max-width: 100% !important; width: 100% !important; }</style>
</head>
<body>

  <!-- TOP NAV -->
  <div class="top-navbar-container">
    <div class="header-item"><a href="../commentators/commentators.html">Commentators</a></div>
    <span class="header-sep">|</span>
    <div class="header-item"><a href="../index.html">Event Dashboard</a></div>
    <span class="header-sep">|</span>
    <div class="header-item"><a href="../top8/top8.html">Top 8</a></div>
    <span class="header-sep">|</span>
    <div class="header-item active"><a href="characterselect.html">Character Select</a></div>
    <span class="header-sep">|</span>
    <div class="header-item"><a href="../stations/stations.html">Stations</a></div>
    <span class="header-sep">|</span>
    <div class="header-item"><a href="../players/players.html">Players</a></div>
  </div>

  <div class="page-content">

    <!-- Selector panel -->
    <div class="selector-panel">
      <div class="page-header">
        <h2>Character Select</h2>
        <div class="header-actions">
          <button onclick="savePlayerCharacterData();">Save</button>
          <button class="btn-sec" onclick="deletePlayerCharacters();">Clear</button>
        </div>
      </div>

      <div class="selectors-row">
        <div class="selector-group">
          <label for="gameSelect">Game</label>
          <select id="gameSelect" onchange="handleGameSelect();"></select>
        </div>
        <div class="selector-group">
          <label for="eventSelect">Event</label>
          <select id="eventSelect" onchange="loadPlayersDropdown();"></select>
        </div>
        <div class="selector-group">
          <label for="playerSelect">Player</label>
          <select id="playerSelect" onchange="loadSelectedPlayer();"></select>
        </div>
      </div>
    </div>

    <!-- Character grid -->
    <div class="section-panel">
      <div class="section-header">Characters</div>
      <div id="characterList"></div>
    </div>

  </div>
  <script src="../theme/theme.js" defer></script>

  <!-- StreamHelper Asset Downloader -->
  <div class="section-panel" style="margin-top:12px;">
    <div class="section-header">StreamHelper Asset Downloader</div>
    <div style="padding:14px;display:flex;flex-direction:column;gap:10px;">

      <div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;">
        <div style="display:flex;flex-direction:column;gap:4px;flex:1;min-width:160px;">
          <label style="font-family:var(--font-d);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--fg2);">Game</label>
          <select id="sh-game-select" onchange="shLoadPacks()" style="width:100%;">
            <option value="">-- Load games --</option>
          </select>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px;flex:1;min-width:160px;">
          <label style="font-family:var(--font-d);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--fg2);">Icon Pack</label>
          <select id="sh-pack-select" style="width:100%;">
            <option value="">-- Select game first --</option>
          </select>
        </div>
        <button class="btn-sec" onclick="shLoadGames()" style="flex-shrink:0;">↺ Load Games</button>
        <button onclick="shDownload()" style="flex-shrink:0;" id="sh-download-btn">⬇ Download Pack</button>
      </div>

      <div id="sh-status" style="font-family:var(--font-d);font-size:11px;color:var(--fg2);min-height:18px;"></div>
    </div>
  </div>

  <script>
  function shStatus(msg, color) {
    var el = document.getElementById('sh-status');
    if (el) { el.textContent = msg; el.style.color = color || 'var(--fg2)'; }
  }

  async function shLoadGames() {
    shStatus('Loading game list from StreamHelperAssets...');
    try {
      var res = await fetch('/streamhelper/games');
      var games = await res.json();
      if (games.error) { shStatus('Error: ' + games.error, 'var(--accent2)'); return; }
      var sel = document.getElementById('sh-game-select');
      sel.innerHTML = '<option value="">-- Select game --</option>';
      games.forEach(function(g) {
        var opt = document.createElement('option');
        opt.value = g; opt.textContent = g;
        sel.appendChild(opt);
      });
      shStatus('Loaded ' + games.length + ' games.', 'var(--green)');
    } catch(e) { shStatus('Error: ' + e, 'var(--accent2)'); }
  }

  async function shLoadPacks() {
    var game = document.getElementById('sh-game-select').value;
    if (!game) return;
    shStatus('Loading icon packs for ' + game + '...');
    var packSel = document.getElementById('sh-pack-select');
    packSel.innerHTML = '<option value="">Loading...</option>';
    try {
      var res = await fetch('/streamhelper/packs?game=' + encodeURIComponent(game));
      var packs = await res.json();
      if (packs.error) { shStatus('Error: ' + packs.error, 'var(--accent2)'); return; }
      packSel.innerHTML = '<option value="">-- Select pack --</option>';
      packs.forEach(function(p) {
        var opt = document.createElement('option');
        opt.value = p; opt.textContent = p;
        packSel.appendChild(opt);
      });
      shStatus('Found ' + packs.length + ' pack(s) for ' + game + '.');
    } catch(e) { shStatus('Error: ' + e, 'var(--accent2)'); }
  }

  async function shDownload() {
    var game = document.getElementById('sh-game-select').value;
    var pack = document.getElementById('sh-pack-select').value;
    if (!game || !pack) { shStatus('Please select a game and icon pack.', 'var(--accent2)'); return; }
    var btn = document.getElementById('sh-download-btn');
    btn.disabled = true;
    btn.textContent = 'Downloading...';
    shStatus('Downloading ' + pack + ' for ' + game + '... this may take a moment.');
    try {
      var res = await fetch('/streamhelper/download', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ game: game, pack: pack })
      });
      var data = await res.json();
      if (data.error) {
        shStatus('Error: ' + data.error, 'var(--accent2)');
      } else {
        var msg = 'Downloaded ' + data.downloaded + ' icons for ' + data.game + ' (' + data.pack + ').';
        if (data.failed > 0) msg += ' ' + data.failed + ' failed.';
        shStatus(msg, 'var(--green)');
      }
    } catch(e) { shStatus('Error: ' + e, 'var(--accent2)'); }
    btn.disabled = false;
    btn.textContent = '⬇ Download Pack';
  }
  </script>

</body>
</html>
