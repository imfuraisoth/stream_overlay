<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>H2H Cam Tag</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div id="tag">
    <div class="accent-bar"></div>
    <div class="tag-body">
      <span class="tag-name" id="name"></span>
      <span class="tag-place" id="place"></span>
      <span class="tag-spacer"></span>
      <div class="tag-record-wrap">
        <span class="tag-record" id="record"></span>
        <span class="tag-scope" id="scope"></span>
      </div>
    </div>
  </div>

  <script>
    // Which player this tag represents (?player=1 or ?player=2)
    var PLAYER = (new URLSearchParams(location.search).get('player') === '2') ? 2 : 1;

    function readServerIp() {
      try {
        var request = new XMLHttpRequest();
        request.open("GET", "../config/serverip.txt", false);
        request.send(null);
        return request.responseText.trim();
      } catch (e) { return location.host; }
    }
    var serverIp = readServerIp();

    function scopeLabel(data) {
      if (data.h2hScope === 'alltime' || !data.h2hScope) return 'All-Time';
      if (String(data.h2hScope).indexOf('series:') === 0) return (data.h2hSeriesName || 'Series');
      return (data.h2hEventName || 'Event');
    }

    function apply(data) {
      var tag = document.getElementById('tag');
      var visible = !!data.h2hVisible;

      var name = (PLAYER === 1) ? data.p1Name : data.p2Name;
      var wins = (PLAYER === 1) ? data.p1MatchupWins : data.p2MatchupWins;
      var losses = (PLAYER === 1) ? data.p1MatchupLosses : data.p2MatchupLosses;
      var placeText = (PLAYER === 1) ? data.p1EventPlacementText : data.p2EventPlacementText;

      // Show only when toggled on AND we have a name + a real record
      var hasRecord = (wins !== '' && wins != null) && (losses !== '' && losses != null)
                      && (Number(wins) + Number(losses) > 0);
      if (!visible || !name || !hasRecord) {
        tag.classList.remove('show');
        return;
      }

      document.getElementById('name').textContent = name;
      document.getElementById('record').textContent = wins + ' - ' + losses;
      document.getElementById('scope').textContent = scopeLabel(data);

      var placeEl = document.getElementById('place');
      if (placeText) { placeEl.textContent = placeText; placeEl.style.display = ''; }
      else { placeEl.style.display = 'none'; }

      tag.classList.add('show');
    }

    function load() {
      fetch('http://' + serverIp + '/getdata')
        .then(function (r) { return r.json(); })
        .then(apply)
        .catch(function (e) { console.log('h2h cam tag error:', e); });
    }

    load();
    window.setInterval(load, 2000);
  </script>
</body>
</html>
