<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>H2H Lower Third</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div id="bar">
    <div class="scope-tab" id="scopeTab"></div>
    <div class="bar-main">
      <div class="side p1">
        <span class="side-name" id="p1name"></span>
        <span class="side-place" id="p1place"></span>
      </div>
      <div class="center">
        <span class="center-label">Head-to-Head</span>
        <span class="center-record">
          <span class="w1" id="rw1"></span><span class="dash">-</span><span class="w2" id="rw2"></span>
        </span>
      </div>
      <div class="side p2">
        <span class="side-name" id="p2name"></span>
        <span class="side-place" id="p2place"></span>
      </div>
    </div>
  </div>

  <script>
    function readServerIp() {
      try {
        var request = new XMLHttpRequest();
        request.open("GET", "../config/serverip.txt", false);
        request.send(null);
        return request.responseText.trim();
      } catch (e) { return location.host; }
    }
    var serverIp = readServerIp();

    function scopeLabel(data) {
      if (data.h2hScope === 'alltime' || !data.h2hScope) return 'All-Time';
      if (String(data.h2hScope).indexOf('series:') === 0) return (data.h2hSeriesName || 'Series') + ' Head-to-Head';
      return (data.h2hEventName || 'Event');
    }

    function setPlace(elId, text) {
      var el = document.getElementById(elId);
      if (text) { el.textContent = text; el.style.display = ''; }
      else { el.style.display = 'none'; }
    }

    function apply(data) {
      var bar = document.getElementById('bar');
      var visible = !!data.h2hVisible;

      var w1 = data.p1MatchupWins, l1 = data.p1MatchupLosses;
      var hasRecord = (w1 !== '' && w1 != null) && (l1 !== '' && l1 != null)
                      && (Number(w1) + Number(l1) > 0);
      if (!visible || !data.p1Name || !data.p2Name || !hasRecord) {
        bar.classList.remove('show');
        return;
      }

      document.getElementById('p1name').textContent = data.p1Name;
      document.getElementById('p2name').textContent = data.p2Name;
      // Center record reads as "P1wins - P2wins" = "P1wins - P1losses"
      document.getElementById('rw1').textContent = w1;
      document.getElementById('rw2').textContent = l1;
      document.getElementById('scopeTab').textContent = scopeLabel(data);
      setPlace('p1place', data.p1EventPlacementText);
      setPlace('p2place', data.p2EventPlacementText);

      bar.classList.add('show');
    }

    function load() {
      fetch('http://' + serverIp + '/getdata')
        .then(function (r) { return r.json(); })
        .then(apply)
        .catch(function (e) { console.log('h2h lower-third error:', e); });
    }

    load();
    window.setInterval(load, 2000);
  </script>
</body>
</html>
